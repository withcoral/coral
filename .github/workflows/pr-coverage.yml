name: PR Coverage

on:
  pull_request:

concurrency:
  group: pr-coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component llvm-tools-preview
          rustup default 1.94.0

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage
        run: make test

      - name: Add coverage to job summary
        run: cat .context/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update sticky PR comment
        if: github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.type != 'Bot'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- pr-coverage-summary -->';
            const summary = fs.readFileSync('.context/coverage/summary.md', 'utf8').trim();
            const body = `${marker}\n${summary}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
