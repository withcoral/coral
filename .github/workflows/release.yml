name: Release
on:
  push:
    branches: [main]
    paths: [Cargo.toml]
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Optional commit SHA or ref from main history to release"
        required: false
        type: string
permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      build_ref: ${{ steps.meta.outputs.build_ref }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      artifact_prefix: ${{ steps.meta.outputs.artifact_prefix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require main branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Run this workflow from main."
            exit 1
          fi
      - name: Prepare release metadata
        id: meta
        run: |
          set -euo pipefail

          read_version() {
            python3 -c "
          import sys, tomllib
          data = tomllib.loads(sys.stdin.read())
          print(data.get('workspace', {}).get('package', {}).get('version', ''))
          "
          }

          source_ref="${GITHUB_SHA}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.target_ref }}" ]; then
            source_ref="${{ inputs.target_ref }}"
          fi

          resolved_sha="$(git rev-parse "${source_ref}^{commit}" 2>/dev/null)" || true
          if [ -z "$resolved_sha" ]; then
            echo "::error::Could not resolve ref '${source_ref}' to a commit."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && ! git merge-base --is-ancestor "$resolved_sha" HEAD; then
            echo "::error::target_ref must point to a commit on main."
            exit 1
          fi

          current_version="$(git show "${resolved_sha}:Cargo.toml" | read_version)"
          if [ -z "$current_version" ]; then
            echo "::error::Could not read [workspace.package].version from Cargo.toml"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            parent_version="$(git show "${resolved_sha}^:Cargo.toml" | read_version)" || true
            if [ "$current_version" = "$parent_version" ]; then
              echo "Version unchanged ($current_version), skipping release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Version changed: $parent_version -> $current_version"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

          version="v${current_version}"
          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "::error::version must look like v0.2.0, got $version"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
              echo "::error::Tag ${version} already exists."
              exit 1
            fi

            latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"
            if [ -n "$latest_tag" ]; then
              highest_version="$(printf '%s\n%s\n' "$latest_tag" "$version" | sort -V | tail -n1)"
              if [ "$highest_version" != "$version" ] || [ "$latest_tag" = "$version" ]; then
                echo "::error::Version ${version} is not newer than latest tag ${latest_tag}."
                exit 1
              fi
            fi
          fi

          {
            echo "build_ref=${resolved_sha}"
            echo "tag_name=$version"
            echo "release_name=$version"
            echo "artifact_prefix=coral"
          } >> "$GITHUB_OUTPUT"

  smoke-test:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
      - name: Install Rust toolchain
        run: rustup show
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          shared-key: coral-${{ runner.os }}-x86_64-unknown-linux-gnu
      - name: Run smoke test
        run: cargo test --locked -p coral-cli --test smoke
  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
      - name: Install Rust toolchain
        run: rustup show
      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          shared-key: coral-${{ runner.os }}-${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: |
          set -euo pipefail
          cargo install cargo-binstall --locked
          cargo binstall --no-confirm --force --disable-strategies compile cross@0.2.5
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --locked --release --features otel-receiver --target ${{ matrix.target }}
          else
            cargo build --locked --release --features otel-receiver --target ${{ matrix.target }}
          fi
      - name: Package
        run: |
          archive="${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.target }}.tar.gz"
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../${archive}" coral
          cd ../../../
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.target }}
          path: ${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.target }}.tar.gz
  checksums:
    needs: [prepare, build, smoke-test]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.prepare.outputs.artifact_prefix }}-*
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ${{ needs.prepare.outputs.artifact_prefix }}-*.tar.gz > checksums.sha256
      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.artifact_prefix }}-checksums
          path: artifacts/checksums.sha256
  release-notes:
    needs: [prepare]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.compose.outputs.release_body }}
    steps:
      - name: Compose release notes
        id: compose
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          BUILD_REF: ${{ needs.prepare.outputs.build_ref }}
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              // Keep release notes anchored to the resolved build commit.
              // This matters for workflow_dispatch runs that release an older
              // commit from main via target_ref.
              target_commitish: process.env.BUILD_REF,
            });

            core.setOutput("release_body", response.data.body.trim());
  publish-version:
    needs: [prepare, checksums, release-notes]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.prepare.outputs.artifact_prefix }}-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: github-app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          # Tag the exact commit selected in prepare instead of defaulting to
          # the current main tip. This is required for manual target_ref
          # releases and keeps the tag aligned with the artifacts and notes.
          target_commitish: ${{ needs.prepare.outputs.build_ref }}
          token: ${{ steps.github-app-token.outputs.token }}
          name: ${{ needs.prepare.outputs.release_name }}
          body: ${{ needs.release-notes.outputs.release_body }}
          files: |
            artifacts/${{ needs.prepare.outputs.artifact_prefix }}-*.tar.gz
            artifacts/checksums.sha256
