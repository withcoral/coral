name: Release
on:
  push:
    branches: [main]
    paths: [Cargo.toml]
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Optional commit SHA or ref from main history to release"
        required: false
        type: string
permissions:
  contents: write
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      build_ref: ${{ steps.meta.outputs.build_ref }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      artifact_prefix: ${{ steps.meta.outputs.artifact_prefix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .github/scripts/.python-version
      - name: Prepare release metadata
        id: meta
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          TARGET_REF: ${{ inputs.target_ref }}
        run: python3 .github/scripts/prepare_release.py

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
      - name: Install Rust toolchain
        run: rustup show
      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          shared-key: coral-${{ runner.os }}-${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: |
          set -euo pipefail
          cargo install cargo-binstall --locked
          cargo binstall --no-confirm --force --disable-strategies compile cross@0.2.5
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --locked --release --target ${{ matrix.target }}
          else
            cargo build --locked --release --target ${{ matrix.target }}
          fi
      - name: Package
        run: |
          archive="${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.target }}.tar.gz"
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../${archive}" coral
          cd ../../../
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.target }}
          path: ${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.target }}.tar.gz
  checksums:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.prepare.outputs.artifact_prefix }}-*
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ${{ needs.prepare.outputs.artifact_prefix }}-*.tar.gz > checksums.sha256
      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.artifact_prefix }}-checksums
          path: artifacts/checksums.sha256
  release-notes:
    needs: [prepare]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.compose.outputs.release_body }}
    steps:
      - name: Compose release notes
        id: compose
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          BUILD_REF: ${{ needs.prepare.outputs.build_ref }}
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              // Keep release notes anchored to the resolved build commit.
              // This matters for workflow_dispatch runs that release an older
              // commit from main via target_ref.
              target_commitish: process.env.BUILD_REF,
            });

            core.setOutput("release_body", response.data.body.trim());
  publish-version:
    needs: [prepare, checksums, release-notes]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.prepare.outputs.artifact_prefix }}-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: github-app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          # Tag the exact commit selected in prepare instead of defaulting to
          # the current main tip. This is required for manual target_ref
          # releases and keeps the tag aligned with the artifacts and notes.
          target_commitish: ${{ needs.prepare.outputs.build_ref }}
          token: ${{ steps.github-app-token.outputs.token }}
          name: ${{ needs.prepare.outputs.release_name }}
          body: ${{ needs.release-notes.outputs.release_body }}
          files: |
            artifacts/${{ needs.prepare.outputs.artifact_prefix }}-*.tar.gz
            artifacts/checksums.sha256
