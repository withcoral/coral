name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect release script changes
        id: release-script-changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            release_python:
              - '.github/scripts/**'
              - '.github/workflows/release.yml'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .github/scripts/.python-version

      - name: Set up uv
        if: steps.release-script-changes.outputs.release_python == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Ruff format check
        if: steps.release-script-changes.outputs.release_python == 'true'
        run: uvx ruff format --check .github/scripts

      - name: Ruff lint
        if: steps.release-script-changes.outputs.release_python == 'true'
        run: uvx ruff check .github/scripts

      - name: Run release script integration tests
        if: steps.release-script-changes.outputs.release_python == 'true'
        run: python3 -m unittest discover -s .github/scripts -p 'test_prepare_release_integration.py'

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-validate-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run make validate
        run: make validate
