name: Validate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Detect release script changes
        id: release-script-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            release_python:
              - '.github/scripts/**'
              - '.github/workflows/release.yml'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .github/scripts/.python-version

      - name: Run release script integration tests
        if: steps.release-script-changes.outputs.release_python == 'true'
        run: python3 -m unittest discover -s .github/scripts -p 'test_prepare_release_integration.py'

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: coral-validate-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run make validate
        run: make validate
