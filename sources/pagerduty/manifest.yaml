    - id
    method: GET
    path: /incidents/{{filter.id}}
  response:
    rows_path:
    - incidents
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: acknowledgements
    type: Utf8
    nullable: true
    virtual: false
    description: List of all acknowledgements for this incident. This list will be empty if the `Incident.status` is `resolved` or `triggered`. If the `include[]=acknowledgers` query parameter is provided, the full user or service definitions will be returned for each acknowledgement entry.
    expr:
      kind: path
      path:
      - acknowledgements
  - name: alert_counts
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - alert_counts
  - name: alert_counts__all
    type: Int64
    nullable: true
    virtual: false
    description: The total count of alerts grouped into this incident
    expr:
      kind: path
      path:
      - alert_counts
      - all
  - name: alert_counts__resolved
    type: Int64
    nullable: true
    virtual: false
    description: The count of resolved alerts grouped into this incident
    expr:
      kind: path
      path:
      - alert_counts
      - resolved
  - name: alert_counts__triggered
    type: Int64
    nullable: true
    virtual: false
    description: The count of triggered alerts grouped into this incident
    expr:
      kind: path
      path:
      - alert_counts
      - triggered
  - name: alert_grouping
    type: Utf8
    nullable: true
    virtual: false
    description: Describes the alert grouping state of this incident. Will be null if the incident has no alerts.
    expr:
      kind: path
      path:
      - alert_grouping
  - name: alert_grouping__alert_grouping_active
    type: Boolean
    nullable: true
    virtual: false
    description: Describes the alert grouping state of this incident. Will be null if the incident has no alerts.
    expr:
      kind: path
      path:
      - alert_grouping
      - alert_grouping_active
  - name: alert_grouping__ended_at
    type: Utf8
    nullable: true
    virtual: false
    description: Describes the alert grouping state of this incident. Will be null if the incident has no alerts.
    expr:
      kind: path
      path:
      - alert_grouping
      - ended_at
  - name: alert_grouping__grouping_type
    type: Utf8
    nullable: true
    virtual: false
    description: Describes the alert grouping state of this incident. Will be null if the incident has no alerts.
    expr:
      kind: path
      path:
      - alert_grouping
      - grouping_type
  - name: alert_grouping__started_at
    type: Utf8
    nullable: true
    virtual: false
    description: Describes the alert grouping state of this incident. Will be null if the incident has no alerts.
    expr:
      kind: path
      path:
      - alert_grouping
      - started_at
  - name: assigned_via
    type: Utf8
    nullable: true
    virtual: false
    description: How the current incident assignments were decided.  Note that `direct_assignment` incidents will not escalate up the attached `escalation_policy`
    expr:
      kind: path
      path:
      - assigned_via
  - name: assignments
    type: Utf8
    nullable: true
    virtual: false
    description: List of all assignments for this incident. This list will be empty if the `Incident.status` is `resolved`. Returns a user reference for each assignment. Full user definitions will be returned if the `include[]=assignees` query parameter is provided.
    expr:
      kind: path
      path:
