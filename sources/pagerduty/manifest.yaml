dsl_version: 3
name: pagerduty
version: 2.0.0
description: The PagerDuty REST API. Please see https://developer.pagerduty.com/docs/get-started/getting-started/ for more details.
backend: http
base_url: https://api.pagerduty.com
auth:
  headers:
  - name: Authorization
    from: template
    template: Token token={{secret.PAGERDUTY_API_TOKEN}}
tables:
- name: abilities
  description: List abilities
  request:
    method: GET
    path: /abilities
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: abilities
    type: Utf8
    nullable: true
    virtual: false
    description: The set of abilities your account has.
    expr:
      kind: path
      path:
      - abilities
- name: active
  description: Get the Service Orchestration active status for a Service
  filters:
  - name: service_id
    required: true
  request:
    method: GET
    path: /event_orchestrations/services/{{filter.service_id}}/active
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: active
    type: Boolean
    nullable: true
    virtual: false
    description: The status of the service orchestration.
    expr:
      kind: path
      path:
      - active
  - name: service_id
    type: Utf8
    nullable: true
    virtual: true
    description: The service ID
    expr:
      kind: from_filter
      key: service_id
- name: addons
  description: List installed Add-ons
  filters:
  - name: total
    required: false
  - name: service_ids[]
    required: false
  - name: filter
    required: false
  - name: id
    required: false
  request:
    method: GET
    path: /addons
    query:
    - name: total
      from: filter
      key: total
    - name: service_ids[]
      explode: true
      from: filter
      key: service_ids[]
    - name: filter
      from: filter
      key: filter
  requests:
  - when_filters:
    - id
    method: GET
    path: /addons/{{filter.id}}
  response:
    rows_path:
    - addons
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: addon
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - addon
  - name: addon__html_url
    type: Utf8
    nullable: true
    virtual: false
    description: a URL at which the entity is uniquely displayed in the Web app
    expr:
      kind: path
      path:
      - addon
      - html_url
  - name: addon__id
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - addon
      - id
  - name: addon__name
    type: Utf8
    nullable: true
    virtual: false
    description: The name of the Add-on.
    expr:
      kind: path
      path:
      - addon
      - name
  - name: addon__self
    type: Utf8
    nullable: true
    virtual: false
    description: the API show URL at which the object is accessible
    expr:
      kind: path
      path:
      - addon
      - self
  - name: addon__src
    type: Utf8
    nullable: true
    virtual: false
    description: The source URL to display in a frame in the PagerDuty UI. HTTPS is required.
    expr:
      kind: path
      path:
      - addon
      - src
  - name: addon__summary
    type: Utf8
    nullable: true
    virtual: false
    description: A short-form, server-generated string that provides succinct, important information about an object suitable for primary labeling of an entity in a client. In many cases, this will be identical to `name`, though it is not intended to be an identifier.
    expr:
      kind: path
      path:
      - addon
      - summary
  - name: addon__type
    type: Utf8
    nullable: true
    virtual: false
    description: The type of Add-on.
    expr:
      kind: path
      path:
      - addon
      - type
  - name: filter
    type: Utf8
    nullable: true
    virtual: true
    description: Filters the results, showing only Add-ons of the given type
    expr:
      kind: from_filter
      key: filter
  - name: html_url
    type: Utf8
    nullable: true
    virtual: false
    description: a URL at which the entity is uniquely displayed in the Web app
    expr:
      kind: path
      path:
      - html_url
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - id
  - name: name
    type: Utf8
    nullable: true
    virtual: false
    description: The user entered name of the Addon.
    expr:
      kind: path
      path:
      - name
  - name: self
    type: Utf8
    nullable: true
    virtual: false
    description: the API show URL at which the object is accessible
    expr:
      kind: path
      path:
      - self
  - name: service_ids[]
    type: Utf8
    nullable: true
    virtual: true
    description: Filters the results, showing only Add-ons for the given services
    expr:
      kind: from_filter
      key: service_ids[]
  - name: src
    type: Utf8
    nullable: true
    virtual: false
    description: The URL source of the Addon
    expr:
      kind: path
      path:
      - src
  - name: summary
    type: Utf8
    nullable: true
    virtual: false
    description: A short-form, server-generated string that provides succinct, important information about an object suitable for primary labeling of an entity in a client. In many cases, this will be identical to `name`, though it is not intended to be an identifier.
    expr:
      kind: path
      path:
      - summary
  - name: total
    type: Boolean
    nullable: true
    virtual: true
    description: |
      By default the `total` field in pagination responses is set to `null` to provide the fastest possible response times. Set `total` to `true` for this field to be populated.

      See our [Pagination Docs](https://developer.pagerduty.com/docs/rest-api-v2/pagination/) for more information.
    expr:
      kind: from_filter
      key: total
  - name: type
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - type
- name: alert_grouping_settings
  description: List alert grouping settings
  filters:
  - name: total
    required: false
  - name: service_ids[]
    required: false
  - name: id
    required: false
  request:
    method: GET
    path: /alert_grouping_settings
    query:
    - name: total
      from: filter
      key: total
    - name: service_ids[]
      explode: true
      from: filter
      key: service_ids[]
  requests:
  - when_filters:
    - id
    method: GET
    path: /alert_grouping_settings/{{filter.id}}
  response:
    rows_path:
    - alert_grouping_settings
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: alert_grouping_setting
    type: Utf8
    nullable: true
    virtual: false
    description: |
      Defines how alerts will be automatically grouped into incidents based on the configurations defined. Note that the Alert Grouping Setting features are available only on certain plans.
    expr:
      kind: path
      path:
      - alert_grouping_setting
  - name: alert_grouping_setting__config
    type: Utf8
    nullable: true
    virtual: false
    description: |
      Defines how alerts will be automatically grouped into incidents based on the configurations defined. Note that the Alert Grouping Setting features are available only on certain plans.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
  - name: alert_grouping_setting__config__aggregate
    type: Utf8
    nullable: true
    virtual: false
    description: Whether Alerts should be grouped if `all` or `any` specified fields match. If `all` is selected, an exact match on every specified field name must occur for Alerts to be grouped. If `any` is selected, Alerts will be grouped when there is an exact match on at least one of the specified fields.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
      - aggregate
  - name: alert_grouping_setting__config__fields
    type: Utf8
    nullable: true
    virtual: false
    description: An array of strings which represent the fields with which to group against. Depending on the aggregate, Alerts will group if some or all the fields match.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
      - fields
  - name: alert_grouping_setting__config__iag_fields
    type: Utf8
    nullable: true
    virtual: false
    description: An array of strings which represent the iag fields with which to intelligently group against.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
      - iag_fields
  - name: alert_grouping_setting__config__recommended_time_window
    type: Int64
    nullable: true
    virtual: false
    description: In order to ensure your Service has the optimal grouping window, we use data science to calculate your Service's average Alert inter-arrival time. We encourage customer's to use this value, please set `time_window` to 0 to use the `recommended_time_window`.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
      - recommended_time_window
  - name: alert_grouping_setting__config__time_window
    type: Int64
    nullable: true
    virtual: false
    description: The maximum amount of time allowed between Alerts. Any Alerts arriving greater than `time_window` seconds apart will not be grouped together. This is a rolling time window up to 24 hours and is counted from the most recently grouped alert. The window is extended every time a new alert is added to the group, up to 24 hours (24 hours only applies to single-service settings). To use the "recommended_time_window," set the value to 0, otherwise the value must be between 300 <= time_window <= 3600.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
      - time_window
  - name: alert_grouping_setting__config__timeout
    type: Int64
    nullable: true
    virtual: false
    description: The duration in seconds within which to automatically group incoming Alerts. To continue grouping Alerts until the Incident is resolved, set this value to 0.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - config
      - timeout
  - name: alert_grouping_setting__created_at
    type: Utf8
    nullable: true
    virtual: false
    description: The ISO8601 date/time an AlertGroupingSetting got created at.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - created_at
  - name: alert_grouping_setting__description
    type: Utf8
    nullable: true
    virtual: false
    description: An optional description in string that provides more information about an AlertGroupingSetting object.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - description
  - name: alert_grouping_setting__id
    type: Utf8
    nullable: true
    virtual: false
    description: |
      Defines how alerts will be automatically grouped into incidents based on the configurations defined. Note that the Alert Grouping Setting features are available only on certain plans.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - id
  - name: alert_grouping_setting__name
    type: Utf8
    nullable: true
    virtual: false
    description: An optional short-form string that provides succinct information about an AlertGroupingSetting object suitable for primary labeling of the entity. It is not intended to be an identifier.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - name
  - name: alert_grouping_setting__services
    type: Utf8
    nullable: true
    virtual: false
    description: The array of one or many Services with just ServiceID/name that the AlertGroupingSetting applies to. Type of content_based_intelligent allows for only one service in the array.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - services
  - name: alert_grouping_setting__type
    type: Utf8
    nullable: true
    virtual: false
    description: |
      Defines how alerts will be automatically grouped into incidents based on the configurations defined. Note that the Alert Grouping Setting features are available only on certain plans.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - type
  - name: alert_grouping_setting__updated_at
    type: Utf8
    nullable: true
    virtual: false
    description: The ISO8601 date/time an AlertGroupingSetting last got updated at.
    expr:
      kind: path
      path:
      - alert_grouping_setting
      - updated_at
  - name: config
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - config
  - name: config__aggregate
    type: Utf8
    nullable: true
    virtual: false
    description: Whether Alerts should be grouped if `all` or `any` specified fields match. If `all` is selected, an exact match on every specified field name must occur for Alerts to be grouped. If `any` is selected, Alerts will be grouped when there is an exact match on at least one of the specified fields.
    expr:
      kind: path
      path:
      - config
      - aggregate
  - name: config__fields
    type: Utf8
    nullable: true
    virtual: false
    description: An array of strings which represent the fields with which to group against. Depending on the aggregate, Alerts will group if some or all the fields match.
    expr:
      kind: path
      path:
      - config
      - fields
  - name: config__iag_fields
    type: Utf8
    nullable: true
    virtual: false
    description: An array of strings which represent the iag fields with which to intelligently group against.
    expr:
      kind: path
      path:
      - config
      - iag_fields
  - name: config__recommended_time_window
    type: Int64
    nullable: true
    virtual: false
    description: In order to ensure your Service has the optimal grouping window, we use data science to calculate your Service's average Alert inter-arrival time. We encourage customer's to use this value, please set `time_window` to 0 to use the `recommended_time_window`.
    expr:
      kind: path
      path:
      - config
      - recommended_time_window
  - name: config__time_window
    type: Int64
    nullable: true
    virtual: false
    description: The maximum amount of time allowed between Alerts. Any Alerts arriving greater than `time_window` seconds apart will not be grouped together. This is a rolling time window up to 24 hours and is counted from the most recently grouped alert. The window is extended every time a new alert is added to the group, up to 24 hours (24 hours only applies to single-service settings). To use the "recommended_time_window," set the value to 0, otherwise the value must be between 300 <= time_window <= 3600.
    expr:
      kind: path
      path:
      - config
      - time_window
  - name: config__timeout
    type: Int64
    nullable: true
    virtual: false
    description: The duration in seconds within which to automatically group incoming Alerts. To continue grouping Alerts until the Incident is resolved, set this value to 0.
    expr:
      kind: path
      path:
      - config
      - timeout
  - name: created_at
    type: Utf8
    nullable: true
    virtual: false
    description: The ISO8601 date/time an AlertGroupingSetting got created at.
    expr:
      kind: path
      path:
      - created_at
  - name: description
    type: Utf8
    nullable: true
    virtual: false
    description: An optional description in string that provides more information about an AlertGroupingSetting object.
    expr:
      kind: path
      path:
      - description
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - id
  - name: name
    type: Utf8
    nullable: true
    virtual: false
    description: An optional short-form string that provides succinct information about an AlertGroupingSetting object suitable for primary labeling of the entity. It is not intended to be an identifier.
    expr:
      kind: path
      path:
      - name
  - name: service_ids[]
    type: Utf8
    nullable: true
    virtual: true
    description: An array of service IDs. Only results related to these services will be returned.
    expr:
      kind: from_filter
      key: service_ids[]
  - name: services
    type: Utf8
    nullable: true
    virtual: false
    description: The array of one or many Services with just ServiceID/name that the AlertGroupingSetting applies to. Type of content_based_intelligent allows for only one service in the array.
    expr:
      kind: path
      path:
      - services
  - name: total
    type: Boolean
    nullable: true
    virtual: true
    description: |
      By default the `total` field in pagination responses is set to `null` to provide the fastest possible response times. Set `total` to `true` for this field to be populated.

      See our [Pagination Docs](https://developer.pagerduty.com/docs/rest-api-v2/pagination/) for more information.
    expr:
      kind: from_filter
      key: total
  - name: type
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - type
  - name: updated_at
    type: Utf8
    nullable: true
    virtual: false
    description: The ISO8601 date/time an AlertGroupingSetting last got updated at.
    expr:
      kind: path
      path:
      - updated_at
- name: analytic_raw_incidents
  description: Get raw data - single incident
  filters:
  - name: id
    required: true
  request:
    method: GET
    path: /analytics/raw/incidents/{{filter.id}}
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: acknowledged_user_ids
    type: Utf8
    nullable: true
    virtual: false
    description: The IDs of the users who acknowledged the incident.
    expr:
      kind: path
      path:
      - acknowledged_user_ids
  - name: acknowledged_user_names
    type: Utf8
    nullable: true
    virtual: false
    description: The names of the users who acknowledged the incident.
    expr:
      kind: path
      path:
      - acknowledged_user_names
  - name: acknowledgement_count
    type: Int64
    nullable: true
    virtual: false
    description: Total count of acknowledgements in the incident.
    expr:
      kind: path
      path:
      - acknowledgement_count
  - name: active_user_count
    type: Int64
    nullable: true
    virtual: false
    description: Total number of responders who either acknowledged the incident or accepted a responder request.
    expr:
      kind: path
      path:
      - active_user_count
  - name: assigned_user_ids
    type: Utf8
    nullable: true
    virtual: false
    description: The IDs of the users who were assigned the incident.
    expr:
      kind: path
      path:
      - assigned_user_ids
  - name: assigned_user_names
    type: Utf8
    nullable: true
    virtual: false
    description: The names of the users who were assigned the incident.
    expr:
      kind: path
      path:
      - assigned_user_names
  - name: assignment_count
    type: Int64
    nullable: true
    virtual: false
    description: Total count of instances where responders were assigned an incident (including through reassignment or escalation).
    expr:
      kind: path
      path:
      - assignment_count
  - name: auto_resolved
    type: Boolean
    nullable: true
    virtual: false
    description: "Whether or not the incident resolved automatically, either via an integration \nor [auto-resolved in PagerDuty](https://support.pagerduty.com/docs/configurable-service-settings#auto-resolution)."
    expr:
      kind: path
      path:
      - auto_resolved
  - name: business_hour_interruptions
    type: Int64
    nullable: true
    virtual: false
    description: Total number of unique interruptions during business hours; 8am-6pm Mon-Fri, based on the user’s time zone.
    expr:
      kind: path
      path:
      - business_hour_interruptions
  - name: created_at
    type: Utf8
    nullable: true
    virtual: false
    description: Timestamp of when the incident was created.
    expr:
      kind: path
      path:
      - created_at
  - name: description
    type: Utf8
    nullable: true
    virtual: false
    description: The incident description
    expr:
      kind: path
      path:
      - description
  - name: engaged_seconds
    type: Int64
    nullable: true
    virtual: false
    description: Total engaged time across all responders for this incident.  Engaged time is measured from the time a user engages with an incident (by acknowledging or accepting a responder request) until the incident is resolved.  This may include periods in which the incidents were snoozed.
    expr:
      kind: path
      path:
      - engaged_seconds
  - name: engaged_user_count
    type: Int64
    nullable: true
    virtual: false
    description: Total number of users who engaged (acknowledged, accepted responder request) in the incident.
    expr:
      kind: path
      path:
      - engaged_user_count
  - name: escalation_count
    type: Int64
    nullable: true
    virtual: false
    description: Total count of instances where an incident is escalated between responders assigned to an escalation policy.
    expr:
      kind: path
      path:
      - escalation_count
  - name: escalation_policy_id
    type: Utf8
    nullable: true
    virtual: false
    description: ID of the escalation policy the incident was assigned to.
    expr:
      kind: path
      path:
      - escalation_policy_id
  - name: escalation_policy_name
    type: Utf8
    nullable: true
    virtual: false
    description: Name of the escalation policy the incident was assigned to.
    expr:
      kind: path
      path:
      - escalation_policy_name
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Incident ID
    expr:
      kind: path
      path:
      - id
  - name: incident_number
    type: Int64
    nullable: true
    virtual: false
    description: The PagerDuty incident number.
    expr:
      kind: path
      path:
      - incident_number
  - name: incident_type_id
    type: Utf8
    nullable: true
    virtual: false
    description: ID of the Incident Type.
    expr:
      kind: path
      path:
      - incident_type_id
  - name: incident_type_name
    type: Utf8
    nullable: true
    virtual: false
    description: The name of the Incident Type.
    expr:
      kind: path
      path:
      - incident_type_name
  - name: joined_user_ids
    type: Utf8
    nullable: true
    virtual: false
    description: The IDs of the users who either acknowledged the incident or accepted a responder request.
    expr:
      kind: path
      path:
      - joined_user_ids
  - name: joined_user_names
    type: Utf8
    nullable: true
    virtual: false
    description: The names of the users who either acknowledged the incident or accepted a responder request.
    expr:
      kind: path
      path:
      - joined_user_names
  - name: major
    type: Boolean
    nullable: true
    virtual: false
    description: An incident is classified as a [major incident](https://support.pagerduty.com/docs/operational-reviews#major-incidents) if it has one of the two highest priorities, or if multiple responders are added and acknowledge the incident.
    expr:
      kind: path
      path:
      - major
  - name: manual_escalation_count
    type: Int64
    nullable: true
    virtual: false
    description: Total count of manual escalations in the incident.
    expr:
      kind: path
      path:
      - manual_escalation_count
  - name: off_hour_interruptions
    type: Int64
    nullable: true
    virtual: false
    description: Total number of unique interruptions during off hours; 6pm-10pm Mon-Fri and all day Sat-Sun, based on the user’s time zone.
    expr:
      kind: path
      path:
      - off_hour_interruptions
  - name: priority_id
    type: Utf8
    nullable: true
    virtual: false
    description: ID of the incident's priority level.
    expr:
      kind: path
      path:
      - priority_id
  - name: priority_name
    type: Utf8
    nullable: true
    virtual: false
    description: The user-provided short name of the priority.
    expr:
      kind: path
      path:
      - priority_name
  - name: priority_order
    type: Int64
    nullable: true
    virtual: false
    description: The numerical value used to sort priorities. Higher values are higher priority.
    expr:
      kind: path
      path:
      - priority_order
  - name: reassignment_count
    type: Int64
    nullable: true
    virtual: false
    description: Total count of reassignments in the incident.
    expr:
      kind: path
      path:
      - reassignment_count
  - name: resolved_at
    type: Utf8
    nullable: true
    virtual: false
    description: Timestamp of when the incident was resolved.
    expr:
      kind: path
      path:
      - resolved_at
  - name: resolved_by_user_id
    type: Utf8
    nullable: true
    virtual: false
    description: ID of the user who resolved the incident.
    expr:
      kind: path
      path:
      - resolved_by_user_id
  - name: resolved_by_user_name
    type: Utf8
