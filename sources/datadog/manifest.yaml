        type: Utf8
        nullable: true
        description: Start time virtual filter
        expr:
          kind: 'null'
        virtual: true
      - name: end
        type: Utf8
        nullable: true
        description: End time virtual filter
        expr:
          kind: 'null'
        virtual: true
      - name: query
