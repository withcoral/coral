    description: Datadog service catalog definitions
    request:
      method: GET
      path: /api/v2/services/definitions
      query: []
    response:
      rows_path:
        - data
    pagination:
      mode: page
      page_param: page[number]
      page_start: 0
      page_step: 1
      page_size:
        default: 100
        max: 100
        query_param: page[size]
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Service definition ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: true
        description: Service name
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - schema
                - dd-service
            - kind: path
              path:
                - attributes
                - schema
                - dd_service
            - kind: path
              path:
                - attributes
                - schema
                - service
            - kind: path
              path:
                - attributes
                - schema
                - name
            - kind: path
              path:
                - id
      - name: schema_version
        type: Utf8
        nullable: true
        description: Service definition schema version
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - schema
                - schema-version
            - kind: path
              path:
                - attributes
                - schema
                - schema_version
      - name: team
        type: Utf8
        nullable: true
        description: Owning team
        expr:
          kind: path
          path:
            - attributes
            - schema
            - team
  - name: apm_dependencies
    description: Datadog APM service dependencies for a focal service
    request:
      method: GET
      path: /api/v1/service_dependencies/{{filter.service}}
      query:
        - name: env
          from: filter
          key: env
          default: '*'
        - name: start
          from: filter
          key: start
        - name: end
          from: filter
          key: end
        - name: primary_tag
          from: filter
          key: primary_tag
    response: {}
    pagination:
      mode: none
    columns:
      - name: service
        type: Utf8
        nullable: true
        description: Focal service name
        expr:
          kind: from_filter
          key: service
      - name: env
        type: Utf8
        nullable: true
        description: Environment
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - env
            - kind: path
              path:
                - data
                - env
            - kind: path
              path:
                - attributes
                - env
            - kind: path
              path:
                - data
                - attributes
                - env
      - name: start
        type: Int64
        nullable: true
        description: Start unix timestamp
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - start
            - kind: path
              path:
                - data
                - start
            - kind: path
              path:
                - attributes
                - start
            - kind: path
              path:
                - data
                - attributes
                - start
      - name: end
        type: Int64
        nullable: true
        description: End unix timestamp
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - end
            - kind: path
              path:
                - data
                - end
            - kind: path
              path:
                - attributes
                - end
            - kind: path
              path:
                - data
                - attributes
                - end
      - name: called_by
        type: Utf8
        nullable: true
        description: Comma-separated upstream services
        expr:
          kind: coalesce
          exprs:
            - kind: join_array
              path:
                - called_by
            - kind: join_array
              path:
                - data
                - called_by
            - kind: join_array
              path:
                - attributes
                - called_by
            - kind: join_array
              path:
                - data
                - attributes
                - called_by
      - name: calls
        type: Utf8
        nullable: true
        description: Comma-separated downstream services
        expr:
          kind: coalesce
          exprs:
            - kind: join_array
              path:
                - calls
            - kind: join_array
              path:
                - data
                - calls
            - kind: join_array
              path:
                - attributes
                - calls
            - kind: join_array
              path:
                - data
                - attributes
                - calls
      - name: primary_tag
        type: Utf8
        nullable: true
        description: Primary tag virtual filter
        expr:
          kind: 'null'
        virtual: true
    filters:
      - name: service
        required: true
      - name: env
      - name: start
      - name: end
      - name: primary_tag
