        expr:
          kind: path
          path:
            - id
      - name: title
        type: Utf8
        nullable: true
        description: Incident title
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - title
            - kind: path
              path:
                - title
      - name: status
        type: Utf8
        nullable: true
        description: Status
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - status
            - kind: path
              path:
                - status
      - name: severity
        type: Utf8
        nullable: true
        description: Severity
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - severity
            - kind: path
              path:
                - severity
      - name: created
        type: Utf8
        nullable: true
        description: Created timestamp
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - created
            - kind: path
              path:
                - created
      - name: modified
        type: Utf8
        nullable: true
        description: Modified timestamp
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - modified
            - kind: path
              path:
                - modified
      - name: resolved_at
        type: Utf8
        nullable: true
        description: Resolved timestamp
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - resolved
            - kind: path
              path:
                - resolved_at
      - name: customer_impacted
        type: Boolean
        nullable: true
        description: Customer impacted
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - attributes
                - customer_impacted
            - kind: path
              path:
                - customer_impacted
            - kind: literal
              value: false
  - name: dashboards
    description: Datadog dashboards
    request:
      method: GET
      path: /api/v1/dashboard
      query: []
    response:
      rows_path:
        - dashboards
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Dashboard ID
        expr:
          kind: path
          path:
            - id
      - name: title
        type: Utf8
        nullable: true
        description: Dashboard title
        expr:
          kind: path
          path:
            - title
      - name: description
        type: Utf8
        nullable: true
        description: Description
        expr:
          kind: path
          path:
            - description
      - name: author_handle
        type: Utf8
        nullable: true
        description: Author handle
        expr:
          kind: path
          path:
            - author_handle
      - name: layout_type
        type: Utf8
        nullable: true
        description: Layout type
        expr:
          kind: path
          path:
            - layout_type
      - name: url
        type: Utf8
        nullable: true
        description: URL
        expr:
          kind: path
          path:
            - url
      - name: created_at
        type: Utf8
        nullable: true
        description: Created timestamp
        expr:
          kind: path
          path:
            - created_at
      - name: modified_at
        type: Utf8
        nullable: true
        description: Modified timestamp
        expr:
          kind: path
          path:
            - modified_at
  - name: hosts
    description: Datadog infrastructure hosts.
    guide: >
      No required filters — returns all hosts. Use up = true to filter for live hosts.
      last_reported_time is Unix epoch seconds.
    request:
      method: GET
      path: /api/v1/hosts
      query: []
    response:
      rows_path:
        - host_list
    pagination:
      mode: offset
      offset_param: start
      offset_start: 0
      page_size:
        default: 100
        max: 1000
        query_param: count
    columns:
      - name: name
        type: Utf8
        nullable: false
        description: Host name
        expr:
          kind: path
          path:
            - name
      - name: id
        type: Int64
        nullable: true
        description: Host ID
        expr:
          kind: path
          path:
            - id
      - name: up
        type: Boolean
        nullable: true
        description: Host up status
        expr:
          kind: path
          path:
            - up
      - name: is_muted
        type: Boolean
        nullable: true
        description: Host muted flag
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - is_muted
            - kind: path
              path:
                - is_muting
      - name: apps
        type: Utf8
        nullable: true
        description: Comma-separated apps
        expr:
          kind: join_array
          path:
            - apps
      - name: sources
        type: Utf8
        nullable: true
        description: Comma-separated sources
        expr:
          kind: join_array
          path:
            - sources
      - name: host_name
        type: Utf8
        nullable: true
        description: Canonical host name
        expr:
          kind: path
          path:
            - host_name
      - name: last_reported_time
        type: Int64
        nullable: true
        description: "Last reported time as Unix epoch seconds."
        expr:
          kind: path
          path:
            - last_reported_time
