name: datadog
version: 2.0.0
dsl_version: 3
backend: http
description: Monitor infrastructure, track incidents, and analyze logs and APM traces
base_url: https://api.{{variable.DD_SITE|datadoghq.com}}
auth:
  headers:
    - name: DD-API-KEY
      from: secret
      key: DD_API_KEY
    - name: DD-APPLICATION-KEY
      from: secret
      key: DD_APPLICATION_KEY

tables:
  - name: monitors
    description: Datadog monitors with status and alert configuration.
    guide: >
      No required filters — returns all monitors. Filter by status or type in SQL.
      Status values: Alert, Warn, No Data, OK, Ignored, Skipped.
    request:
      method: GET
      path: /api/v1/monitor
      query: []
    response: {}
    pagination:
      mode: page
      page_param: page
      page_start: 0
      page_step: 1
      page_size:
        default: 100
        max: 100
        query_param: page_size
    columns:
      - name: id
        type: Int64
        nullable: false
        description: Monitor ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: true
        description: Monitor name
        expr:
          kind: path
          path:
            - name
      - name: type
        type: Utf8
        nullable: true
        description: Monitor type
        expr:
          kind: path
          path:
            - type
      - name: query
        type: Utf8
        nullable: true
        description: Monitor query
        expr:
          kind: path
          path:
            - query
      - name: status
        type: Utf8
        nullable: true
        description: "Monitor status. Values: Alert, Warn, No Data, OK, Ignored, Skipped."
        expr:
          kind: path
          path:
            - overall_state
      - name: message
        type: Utf8
        nullable: true
        description: Notification message
        expr:
          kind: path
          path:
            - message
      - name: created
        type: Utf8
        nullable: true
        description: Created timestamp
        expr:
          kind: path
          path:
            - created
      - name: modified
        type: Utf8
        nullable: true
        description: Modified timestamp
        expr:
          kind: path
          path:
            - modified
      - name: tags
        type: Utf8
        nullable: true
        description: Comma-separated tags
        expr:
          kind: join_array
          path:
            - tags
  - name: monitor_search
    description: Datadog monitor search results
    request:
      method: GET
      path: /api/v1/monitor/search
      query:
        - name: query
          from: filter
          key: query
    response:
      rows_path:
        - monitors
    pagination:
      mode: page
      page_param: page
      page_start: 0
      page_step: 1
      page_size:
        default: 100
        max: 100
        query_param: per_page
    columns:
      - name: id
        type: Int64
        nullable: false
        description: Monitor ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: true
        description: Monitor name
        expr:
          kind: path
          path:
            - name
      - name: type
        type: Utf8
        nullable: true
        description: Monitor type
        expr:
          kind: path
          path:
            - type
      - name: status
        type: Utf8
        nullable: true
        description: Monitor status
        expr:
          kind: coalesce
          exprs:
            - kind: path
              path:
                - overall_state
            - kind: path
              path:
                - status
      - name: monitor_query
        type: Utf8
        nullable: true
        description: Monitor query
        expr:
          kind: path
          path:
            - query
      - name: tags
        type: Utf8
        nullable: true
        description: Comma-separated tags
        expr:
          kind: join_array
          path:
            - tags
      - name: query
        type: Utf8
        nullable: true
        description: Monitor search query virtual filter
        expr:
          kind: 'null'
        virtual: true
    filters:
      - name: query
        required: true
  - name: events
    description: Datadog events within a time range.
    guide: >
      Requires start and end filters in ISO 8601 format (e.g. '2024-01-15T00:00:00Z').
      date_happened is Unix epoch seconds. Priority values: normal, low.
    request:
      method: GET
      path: /api/v1/events
      query:
        - name: start
          from: filter
          key: start
        - name: end
          from: filter
          key: end
    response:
      rows_path:
        - events
    pagination:
      mode: page
      page_param: page
      page_start: 0
      page_step: 1
      page_size:
        default: 100
        max: 100
        query_param: page_size
    columns:
      - name: id
        type: Int64
        nullable: true
        description: Event ID
        expr:
          kind: path
          path:
            - id
      - name: title
        type: Utf8
        nullable: true
        description: Event title
        expr:
          kind: path
          path:
            - title
      - name: text
        type: Utf8
        nullable: true
        description: Event body
        expr:
          kind: path
          path:
            - text
      - name: date_happened
        type: Int64
        nullable: true
        description: "Event timestamp as Unix epoch seconds. Divide by 1 for seconds, no conversion
          needed."
        expr:
          kind: path
          path:
            - date_happened
      - name: host
        type: Utf8
        nullable: true
        description: Host
        expr:
          kind: path
          path:
            - host
      - name: source
        type: Utf8
        nullable: true
        description: Source
        expr:
          kind: path
          path:
            - source
      - name: priority
        type: Utf8
        nullable: true
        description: "Event priority. Values: normal, low."
        expr:
          kind: path
          path:
            - priority
      - name: tags
        type: Utf8
        nullable: true
        description: Comma-separated tags
        expr:
          kind: join_array
          path:
            - tags
      - name: start
        type: Utf8
        nullable: true
        description: Start time virtual filter
        expr:
          kind: 'null'
        virtual: true
      - name: end
        type: Utf8
        nullable: true
        description: End time virtual filter
        expr:
          kind: 'null'
        virtual: true
    filters:
      - name: start
        required: true
      - name: end
        required: true
  - name: incidents
    description: Datadog incidents
    request:
      method: GET
      path: /api/v2/incidents
      query: []
    response:
      rows_path:
        - data
    pagination:
      mode: offset
      offset_param: page[offset]
      offset_start: 0
      page_size:
        default: 100
        max: 100
        query_param: page[size]
    columns:
