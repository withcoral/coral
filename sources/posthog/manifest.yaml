    type: Utf8
    nullable: true
    virtual: false
    description: When this proxy record was created.
    expr:
      kind: path
      path:
      - created_at
  - name: created_by
    type: Int64
    nullable: true
    virtual: false
    description: ID of the user who created this proxy record.
    expr:
      kind: path
      path:
      - created_by
  - name: domain
    type: Utf8
    nullable: true
    virtual: false
    description: The custom domain to proxy through, e.g. 'e.example.com'. Must be a valid subdomain you control.
    expr:
      kind: path
      path:
      - domain
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the proxy record.
    expr:
      kind: path
      path:
      - id
  - name: max_proxy_records
    type: Int64
    nullable: true
    virtual: false
    description: Maximum number of proxy records allowed for this organization's current plan.
    expr:
      kind: path
      path:
      - max_proxy_records
  - name: message
    type: Utf8
    nullable: true
    virtual: false
    description: Human-readable status message with details about errors or warnings, if any.
    expr:
      kind: path
      path:
      - message
  - name: organization_id
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: organization_id
  - name: results
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - results
  - name: status
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Current provisioning status. Values: waiting (DNS verification pending), issuing (SSL certificate being issued), valid (proxy is live and working), warning (proxy has issues but is operational), erroring (proxy setup failed), deleting (removal in progress), timed_out (DNS verification timed out).

      * `waiting` - Waiting
      * `issuing` - Issuing
      * `valid` - Valid
      * `warning` - Warning
      * `erroring` - Erroring
      * `deleting` - Deleting
      * `timed_out` - Timed Out
    expr:
      kind: path
      path:
      - status
