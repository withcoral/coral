  - name: calculation_interval
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      How often the alert is checked: hourly, daily, weekly, or monthly.

      * `hourly` - hourly
      * `daily` - daily
      * `weekly` - weekly
      * `monthly` - monthly
    expr:
      kind: path
      path:
      - calculation_interval
  - name: checks
    type: Utf8
    nullable: true
    virtual: false
    description: Alert check results. By default returns the last 5. Use checks_date_from and checks_date_to (e.g. '-24h', '-7d') to get checks within a time window, and checks_limit to control the maximum returned (default 5, max 500). Only populated on retrieve.
    expr:
      kind: path
      path:
      - checks
  - name: checks_date_from
    type: Utf8
    nullable: true
    virtual: true
    description: Relative date string for the start of the check history window (e.g. '-24h', '-7d', '-14d'). Returns checks created after this time. Max retention is 14 days.
    expr:
      kind: from_filter
      key: checks_date_from
  - name: checks_date_to
    type: Utf8
    nullable: true
    virtual: true
    description: Relative date string for the end of the check history window (e.g. '-1h', '-1d'). Defaults to now if not specified.
    expr:
      kind: from_filter
      key: checks_date_to
  - name: checks_limit
    type: Int64
    nullable: true
    virtual: true
    description: Maximum number of check results to return (default 5, max 500). Applied after date filtering.
    expr:
      kind: from_filter
      key: checks_limit
  - name: condition
    type: Utf8
    nullable: true
    virtual: false
