    type: Utf8
    nullable: true
    virtual: false
    description: The CNAME target to add as a DNS record for your domain. Point your domain's CNAME to this value.
    expr:
      kind: path
      path:
      - target_cname
  - name: updated_at
    type: Utf8
    nullable: true
    virtual: false
    description: When this proxy record was last updated.
    expr:
      kind: path
      path:
      - updated_at
