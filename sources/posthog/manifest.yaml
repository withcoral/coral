- name: alerts
  description: environment_alerts
  filters:
  - name: environment_id
    required: true
  - name: checks_date_from
    required: false
  - name: checks_date_to
    required: false
  - name: checks_limit
    required: false
  - name: id
    required: false
  - name: project_id
    required: false
  request:
    method: GET
    path: /api/environments/{{filter.environment_id}}/alerts/
  requests:
  - when_filters:
    - environment_id
    - id
    method: GET
    path: /api/environments/{{filter.environment_id}}/alerts/{{filter.id}}/
    query:
    - name: checks_date_from
      from: filter
      key: checks_date_from
    - name: checks_date_to
      from: filter
      key: checks_date_to
    - name: checks_limit
      from: filter
      key: checks_limit
  - when_filters:
    - project_id
    method: GET
    path: /api/projects/{{filter.project_id}}/alerts/
  response:
    rows_path:
    - results
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: anomaly_scores
    type: Utf8
    nullable: true
