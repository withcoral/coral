- name: properties_at_time
  description: |-
    Get person properties as they existed at a specific point in time.

    This endpoint reconstructs person properties by querying ClickHouse events
    for $set and $set_once operations up to the specified timestamp.

    Query parameters:
    - distinct_id: The distinct_id of the person
    - timestamp: ISO datetime string for the point in time (e.g., "2023-06-15T14:30:00Z")
    - include_set_once: Whether to handle $set_once operations (default: false)
    - debug: Whether to include debug information with raw events (default: false)
  filters:
  - name: debug
    required: false
  - name: distinct_id
    required: false
  - name: environment_id
    required: true
  - name: format
    required: false
  - name: include_set_once
    required: false
  - name: person_id
    required: false
  - name: timestamp
    required: true
  - name: project_id
    required: false
  request:
    method: GET
    path: /api/environments/{{filter.environment_id}}/persons/properties_at_time/
    query:
    - name: debug
      from: filter
      key: debug
    - name: distinct_id
      from: filter
      key: distinct_id
    - name: format
      from: filter
      key: format
    - name: include_set_once
      from: filter
      key: include_set_once
    - name: person_id
      from: filter
      key: person_id
    - name: timestamp
      from: filter
      key: timestamp
  requests:
  - when_filters:
    - project_id
    method: GET
    path: /api/projects/{{filter.project_id}}/persons/properties_at_time/
    query:
    - name: debug
      from: filter
      key: debug
    - name: distinct_id
      from: filter
      key: distinct_id
    - name: format
      from: filter
      key: format
    - name: include_set_once
      from: filter
      key: include_set_once
    - name: person_id
      from: filter
      key: person_id
    - name: timestamp
      from: filter
      key: timestamp
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: created_at
    type: Utf8
    nullable: true
    virtual: false
    description: When the person was first created
    expr:
      kind: path
      path:
      - created_at
  - name: debug
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - debug
  - name: debug__error
    type: Utf8
    nullable: true
    virtual: false
    description: Error message if debug query failed
    expr:
      kind: path
      path:
      - debug
      - error
  - name: debug__events
    type: Utf8
    nullable: true
    virtual: false
    description: Raw events that were used to build the properties
    expr:
      kind: path
      path:
      - debug
