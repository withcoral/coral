      - name: order_by
        type: Utf8
        nullable: true
        virtual: true
        description: Optional sort field
        expr:
          kind: from_filter
          key: order_by
      - name: query
        type: Utf8
        nullable: true
        virtual: true
        description: Optional version search query
        expr:
          kind: from_filter
