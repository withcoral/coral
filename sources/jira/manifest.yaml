dsl_version: 3
name: jira
version: 0.1.0
description: Jira Cloud REST API source for project metadata
backend: http
base_url: "{{variable.JIRA_BASE_URL|https://your-domain.atlassian.net}}"
auth:
  required_secrets:
    - JIRA_BASIC_AUTH
  headers:
    - name: Authorization
      from: template
      template: Basic {{secret.JIRA_BASIC_AUTH}}
    - name: Accept
      from: literal
      value: application/json
tables:
  - name: projects
    description: Projects visible to the authenticated Jira user
    filters:
      - name: query
        required: false
      - name: expand
        required: false
      - name: order_by
        required: false
    request:
      method: GET
      path: /rest/api/3/project/search
      query:
        - name: query
          from: filter
          key: query
        - name: expand
          from: filter
          key: expand
        - name: orderBy
          from: filter
          key: order_by
    response:
      rows_path:
        - values
      row_strategy: direct
    pagination:
      mode: offset
      offset_param: startAt
      page_size:
        default: 50
        max: 50
        query_param: maxResults
    columns:
      - name: id
        type: Int64
        nullable: false
        description: Project ID
        expr:
          kind: path
          path:
            - id
      - name: key
        type: Utf8
        nullable: true
        description: Project key
        expr:
          kind: path
          path:
            - key
      - name: name
        type: Utf8
        nullable: true
        description: Project name
        expr:
          kind: path
          path:
            - name
      - name: project_type_key
        type: Utf8
        nullable: true
        description: Project type key
        expr:
          kind: path
          path:
            - projectTypeKey
      - name: simplified
        type: Boolean
        nullable: true
        description: Whether the project uses the simplified workflow model
        expr:
          kind: path
          path:
            - simplified
      - name: style
        type: Utf8
        nullable: true
        description: Project style
        expr:
          kind: path
          path:
            - style
      - name: is_private
        type: Boolean
        nullable: true
        description: Whether the project is private
        expr:
          kind: path
          path:
            - isPrivate
      - name: self
        type: Utf8
        nullable: true
        description: Jira API URL for the project
        expr:
          kind: path
          path:
            - self
      - name: avatar_url_48x48
        type: Utf8
        nullable: true
        description: Project avatar URL at 48x48 resolution
        expr:
          kind: path
          path:
            - avatarUrls
            - 48x48
      - name: category_id
        type: Int64
        nullable: true
        description: Project category ID
        expr:
          kind: path
          path:
            - projectCategory
            - id
      - name: category_name
        type: Utf8
        nullable: true
        description: Project category name
        expr:
          kind: path
          path:
            - projectCategory
            - name
      - name: query
        type: Utf8
        nullable: true
        virtual: true
        description: Optional project search query
        expr:
          kind: from_filter
          key: query
      - name: expand
        type: Utf8
        nullable: true
        virtual: true
        description: Optional expand parameter
        expr:
          kind: from_filter
          key: expand
      - name: order_by
        type: Utf8
        nullable: true
        virtual: true
        description: Optional sort field
        expr:
          kind: from_filter
          key: order_by
  - name: issues
    description: Issues visible to the authenticated Jira user
    filters:
      - name: jql
        required: true
      - name: expand
        required: false
    request:
      method: GET
      path: /rest/api/3/search/jql
      query:
        - name: jql
          from: filter
          key: jql
        - name: expand
          from: filter
          key: expand
        - name: fields
          from: literal
          value: summary,status,issuetype,project,assignee,priority,reporter,created,updated,resolutiondate
    response:
      rows_path:
        - issues
      row_strategy: direct
    pagination:
      mode: cursor_query
      cursor_param: nextPageToken
      response_cursor_path:
        - nextPageToken
      page_size:
        default: 50
        max: 50
        query_param: maxResults
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Issue ID
        expr:
          kind: path
          path:
            - id
      - name: key
        type: Utf8
        nullable: true
        description: Issue key
        expr:
          kind: path
          path:
            - key
      - name: self
        type: Utf8
        nullable: true
        description: Jira API URL for the issue
        expr:
          kind: path
          path:
            - self
      - name: summary
        type: Utf8
        nullable: true
        description: Issue summary
        expr:
          kind: path
          path:
            - fields
            - summary
      - name: status_name
        type: Utf8
        nullable: true
        description: Current issue status
        expr:
          kind: path
          path:
            - fields
            - status
            - name
      - name: issue_type_name
        type: Utf8
        nullable: true
        description: Issue type name
        expr:
          kind: path
          path:
            - fields
            - issuetype
            - name
      - name: issue_type_subtask
        type: Boolean
        nullable: true
        description: Whether the issue type is a sub-task
        expr:
          kind: path
          path:
            - fields
            - issuetype
            - subtask
      - name: project_id
        type: Utf8
        nullable: true
        description: Parent project ID
        expr:
          kind: path
          path:
            - fields
            - project
            - id
      - name: project_key
        type: Utf8
        nullable: true
        description: Parent project key
        expr:
          kind: path
          path:
            - fields
            - project
            - key
      - name: project_name
        type: Utf8
        nullable: true
        description: Parent project name
        expr:
          kind: path
          path:
            - fields
            - project
            - name
      - name: assignee_account_id
        type: Utf8
        nullable: true
        description: Assignee account ID
        expr:
          kind: path
          path:
            - fields
            - assignee
            - accountId
      - name: assignee_display_name
        type: Utf8
        nullable: true
        description: Assignee display name
        expr:
          kind: path
          path:
            - fields
            - assignee
            - displayName
      - name: reporter_account_id
        type: Utf8
        nullable: true
        description: Reporter account ID
        expr:
          kind: path
          path:
            - fields
            - reporter
            - accountId
      - name: reporter_display_name
        type: Utf8
        nullable: true
        description: Reporter display name
        expr:
          kind: path
          path:
            - fields
            - reporter
            - displayName
      - name: priority_name
        type: Utf8
        nullable: true
        description: Priority name
        expr:
          kind: path
          path:
            - fields
            - priority
            - name
      - name: created
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - fields
            - created
      - name: updated
        type: Utf8
        nullable: true
        description: Last update timestamp
        expr:
          kind: path
          path:
            - fields
            - updated
      - name: resolution_date
        type: Utf8
        nullable: true
        description: Resolution timestamp, if resolved
        expr:
          kind: path
          path:
            - fields
            - resolutiondate
      - name: jql
        type: Utf8
        nullable: true
        virtual: true
        description: Optional JQL query
        expr:
          kind: from_filter
          key: jql
      - name: expand
        type: Utf8
        nullable: true
        virtual: true
        description: Optional expand parameter
        expr:
          kind: from_filter
          key: expand
  - name: issue_comments
    description: Comments for a specific Jira issue
    filters:
      - name: issue_id_or_key
        required: true
      - name: order_by
        required: false
      - name: expand
        required: false
    request:
      method: GET
      path: /rest/api/3/issue/{{filter.issue_id_or_key}}/comment
      query:
        - name: orderBy
          from: filter
          key: order_by
        - name: expand
          from: filter
          key: expand
    response:
      rows_path:
        - comments
      row_strategy: direct
      allow_404_empty: false
    pagination:
      mode: offset
      offset_param: startAt
      page_size:
        default: 50
        max: 50
        query_param: maxResults
    columns:
      - name: issue_id_or_key
        type: Utf8
        nullable: false
        virtual: true
        description: Issue ID or key used to fetch comments
        expr:
          kind: from_filter
          key: issue_id_or_key
      - name: id
        type: Utf8
        nullable: false
        description: Comment ID
        expr:
          kind: path
          path:
            - id
      - name: self
        type: Utf8
        nullable: true
        description: Jira API URL for the comment
        expr:
          kind: path
          path:
            - self
      - name: body
        type: Utf8
        nullable: true
        description: Comment body as Atlassian document JSON
        expr:
          kind: path
          path:
            - body
      - name: created
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - created
      - name: updated
        type: Utf8
        nullable: true
        description: Last update timestamp
        expr:
          kind: path
          path:
            - updated
      - name: author_account_id
        type: Utf8
        nullable: true
        description: Comment author account ID
        expr:
          kind: path
          path:
            - author
            - accountId
      - name: author_display_name
        type: Utf8
        nullable: true
        description: Comment author display name
        expr:
          kind: path
          path:
            - author
            - displayName
      - name: update_author_account_id
        type: Utf8
        nullable: true
        description: Account ID of the user who last updated the comment
        expr:
          kind: path
          path:
            - updateAuthor
            - accountId
      - name: update_author_display_name
        type: Utf8
        nullable: true
        description: Display name of the user who last updated the comment
        expr:
          kind: path
          path:
            - updateAuthor
            - displayName
      - name: visibility_type
        type: Utf8
        nullable: true
        description: Visibility restriction type
        expr:
          kind: path
          path:
            - visibility
            - type
      - name: visibility_value
        type: Utf8
        nullable: true
        description: Visibility restriction value
        expr:
          kind: path
          path:
            - visibility
            - value
      - name: order_by
        type: Utf8
        nullable: true
        virtual: true
        description: Optional comment sort order
        expr:
          kind: from_filter
          key: order_by
      - name: expand
        type: Utf8
        nullable: true
        virtual: true
        description: Optional expand parameter
        expr:
          kind: from_filter
          key: expand
