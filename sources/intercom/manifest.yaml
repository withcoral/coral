  - name: data_attributes
    description: Data attributes for contacts, companies, and conversations
    filters:
      - name: model
        required: false
    request:
      method: GET
      path: /data_attributes
      query:
        - name: model
          from: filter
          key: model
        - name: include_archived
          from: literal
          value: "false"
    response:
      rows_path:
        - data
    columns:
      - name: id
        type: Int64
        nullable: true
