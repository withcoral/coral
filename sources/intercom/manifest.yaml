dsl_version: 3
name: intercom
version: 0.1.0
description: Customer messaging platform for support, engagement, and marketing
backend: http
base_url: https://api.intercom.io
auth:
  required_secrets:
    - INTERCOM_ACCESS_TOKEN
  headers:
    - name: Authorization
      from: template
      template: Bearer {{secret.INTERCOM_ACCESS_TOKEN}}
    - name: Intercom-Version
      from: literal
      value: "2.11"
    - name: Accept
      from: literal
      value: application/json
tables:
  - name: contacts
    description: Contacts (users and leads) in the workspace
    request:
      method: GET
      path: /contacts
    response:
      rows_path:
        - data
    pagination:
      mode: cursor_query
      cursor_param: starting_after
      response_cursor_path:
        - pages
        - next
        - starting_after
      page_size:
        default: 50
        max: 50
        query_param: per_page
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Contact ID
        expr:
          kind: path
          path:
            - id
      - name: external_id
        type: Utf8
        nullable: true
        description: External ID from your system
        expr:
          kind: path
          path:
            - external_id
      - name: role
        type: Utf8
        nullable: true
        description: Contact role (user or lead)
        expr:
          kind: path
          path:
            - role
      - name: email
        type: Utf8
        nullable: true
        description: Email address
        expr:
          kind: path
          path:
            - email
      - name: name
        type: Utf8
        nullable: true
        description: Full name
        expr:
          kind: path
          path:
            - name
      - name: phone
        type: Utf8
        nullable: true
        description: Phone number
        expr:
          kind: path
          path:
            - phone
      - name: owner_id
        type: Int64
        nullable: true
        description: ID of the admin that owns the contact
        expr:
          kind: path
          path:
            - owner_id
      - name: has_hard_bounced
        type: Boolean
        nullable: true
        description: Whether the contact has hard bounced
        expr:
          kind: path
          path:
            - has_hard_bounced
      - name: marked_email_as_spam
        type: Boolean
        nullable: true
        description: Whether the contact marked email as spam
        expr:
          kind: path
          path:
            - marked_email_as_spam
      - name: unsubscribed_from_emails
        type: Boolean
        nullable: true
        description: Whether the contact unsubscribed from emails
        expr:
          kind: path
          path:
            - unsubscribed_from_emails
      - name: created_at
        type: Int64
        nullable: true
        description: Creation timestamp (Unix)
        expr:
          kind: path
          path:
            - created_at
      - name: updated_at
        type: Int64
        nullable: true
        description: Last updated timestamp (Unix)
        expr:
          kind: path
          path:
            - updated_at
      - name: signed_up_at
        type: Int64
        nullable: true
        description: Sign-up timestamp (Unix)
        expr:
          kind: path
          path:
            - signed_up_at
      - name: last_seen_at
        type: Int64
        nullable: true
        description: Last seen timestamp (Unix)
        expr:
          kind: path
          path:
            - last_seen_at
      - name: last_replied_at
        type: Int64
        nullable: true
        description: Last replied timestamp (Unix)
        expr:
          kind: path
          path:
            - last_replied_at
      - name: last_contacted_at
        type: Int64
        nullable: true
        description: Last contacted timestamp (Unix)
        expr:
          kind: path
          path:
            - last_contacted_at
      - name: last_email_opened_at
        type: Int64
        nullable: true
        description: Last email opened timestamp (Unix)
        expr:
          kind: path
          path:
            - last_email_opened_at
      - name: last_email_clicked_at
        type: Int64
        nullable: true
        description: Last email clicked timestamp (Unix)
        expr:
          kind: path
          path:
            - last_email_clicked_at
      - name: language_override
        type: Utf8
        nullable: true
        description: Language override
        expr:
          kind: path
          path:
            - language_override
      - name: browser
        type: Utf8
        nullable: true
        description: Browser name
        expr:
          kind: path
          path:
            - browser
      - name: browser_language
        type: Utf8
        nullable: true
        description: Browser language
        expr:
          kind: path
          path:
            - browser_language
      - name: os
        type: Utf8
        nullable: true
        description: Operating system
        expr:
          kind: path
          path:
            - os
      - name: location_country
        type: Utf8
        nullable: true
        description: Country
        expr:
          kind: path
          path:
            - location
            - country
      - name: location_region
        type: Utf8
        nullable: true
        description: Region
        expr:
          kind: path
          path:
            - location
            - region
      - name: location_city
        type: Utf8
        nullable: true
        description: City
        expr:
          kind: path
          path:
            - location
