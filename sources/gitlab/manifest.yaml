- name: all_runners
  description: List available runners
  filters:
  - name: scope
    required: false
  - name: type
    required: false
  - name: paused
    required: false
  - name: status
    required: false
  - name: tag_list
    required: false
  - name: version_prefix
    required: false
  - name: id
    required: false
  - name: include_projects
    required: false
  request:
    method: GET
    path: /api/v4/runners
    query:
    - name: scope
      from: filter
      key: scope
    - name: type
      from: filter
      key: type
    - name: paused
      from: filter
      key: paused
    - name: status
      from: filter
      key: status
    - name: tag_list
