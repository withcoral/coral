    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - url_text
- name: project_job_artifact_tree
  description: List all files in the artifacts archive
  filters:
  - name: id
    required: true
  - name: job_id
    required: true
  - name: path
    required: false
  - name: recursive
    required: false
  - name: job_token
    required: false
  request:
    method: GET
    path: /api/v4/projects/{{filter.id}}/jobs/{{filter.job_id}}/artifacts/tree
    query:
    - name: path
      from: filter
      key: path
    - name: recursive
      from: filter
      key: recursive
    - name: job_token
      from: filter
      key: job_token
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: page
    page_size:
      default: 20
      max: 100
      query_param: per_page
    page_param: page
    page_start: 1
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: id
    type: Utf8
    nullable: true
    virtual: true
    description: The ID or URL-encoded path of the project
    expr:
      kind: from_filter
      key: id
  - name: job_id
    type: Int64
    nullable: true
    virtual: true
    description: ID of a job
    expr:
      kind: from_filter
      key: job_id
  - name: job_token
    type: Utf8
    nullable: true
    virtual: true
    description: CI/CD job token for multi-project pipelines. Premium and Ultimate only.
    expr:
      kind: from_filter
      key: job_token
  - name: mode
    type: Utf8
