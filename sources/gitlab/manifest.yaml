  - when_filters:
    - id
    method: GET
    path: /api/v4/runners/{{filter.id}}
    query:
    - name: include_projects
      from: filter
      key: include_projects
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: page
    page_size:
      default: 20
      max: 100
      query_param: per_page
    page_param: page
    page_start: 1
    page_step: 1
    offset_start: 0
    link_header_require_results: false
