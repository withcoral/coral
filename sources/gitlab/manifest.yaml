  description: Get a list of shared projects in this group
  filters:
  - name: id
    required: true
  - name: archived
    required: false
  - name: visibility
    required: false
  - name: search
    required: false
  - name: order_by
    required: false
  - name: sort
    required: false
  - name: simple
    required: false
  - name: starred
    required: false
  - name: with_issues_enabled
    required: false
  - name: with_merge_requests_enabled
    required: false
  - name: min_access_level
    required: false
  - name: with_custom_attributes
    required: false
  request:
    method: GET
    path: /api/v4/groups/{{filter.id}}/projects/shared
    query:
    - name: archived
      from: filter
      key: archived
    - name: visibility
