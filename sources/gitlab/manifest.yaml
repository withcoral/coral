- name: project_issue_metric_images
  description: Metric Images for issue
  filters:
  - name: id
    required: true
  - name: issue_iid
    required: true
  request:
    method: GET
    path: /api/v4/projects/{{filter.id}}/issues/{{filter.issue_iid}}/metric_images
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: created_at
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - created_at
  - name: file_path
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - file_path
  - name: filename
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - filename
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - id
  - name: issue_iid
    type: Int64
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: issue_iid
  - name: url
    type: Utf8
    nullable: true
    virtual: false
    expr:
