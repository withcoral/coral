- name: groups
  description: Get a groups list
  filters:
  - name: statistics
    required: false
  - name: archived
    required: false
  - name: skip_groups
    required: false
  - name: all_available
    required: false
  - name: visibility
    required: false
  - name: search
    required: false
  - name: owned
    required: false
  - name: order_by
    required: false
  - name: sort
    required: false
  - name: min_access_level
    required: false
  - name: top_level_only
    required: false
  - name: marked_for_deletion_on
    required: false
  - name: active
    required: false
  - name: repository_storage
    required: false
  - name: with_custom_attributes
    required: false
  - name: id
    required: false
  - name: with_projects
    required: false
  request:
    method: GET
    path: /api/v4/groups
    query:
    - name: statistics
      from: filter
      key: statistics
    - name: archived
      from: filter
      key: archived
    - name: skip_groups
      explode: false
      from: filter
      key: skip_groups
    - name: all_available
      from: filter
      key: all_available
    - name: visibility
      from: filter
      key: visibility
    - name: search
      from: filter
      key: search
    - name: owned
      from: filter
      key: owned
    - name: order_by
      from: filter
      key: order_by
    - name: sort
      from: filter
      key: sort
    - name: min_access_level
      from: filter
      key: min_access_level
    - name: top_level_only
      from: filter
      key: top_level_only
    - name: marked_for_deletion_on
      from: filter
      key: marked_for_deletion_on
    - name: active
      from: filter
      key: active
    - name: repository_storage
      from: filter
      key: repository_storage
    - name: with_custom_attributes
      from: filter
      key: with_custom_attributes
  requests:
  - when_filters:
    - id
    method: GET
    path: /api/v4/groups/{{filter.id}}
    query:
    - name: with_custom_attributes
      from: filter
      key: with_custom_attributes
    - name: with_projects
      from: filter
      key: with_projects
  response:
