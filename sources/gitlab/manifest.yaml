- name: group_transfer_locations
  description: Get the groups to where the current group can be transferred to
  filters:
  - name: id
    required: true
  - name: search
    required: false
  request:
    method: GET
    path: /api/v4/groups/{{filter.id}}/transfer_locations
    query:
    - name: search
      from: filter
      key: search
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: page
    page_size:
      default: 20
      max: 100
      query_param: per_page
    page_param: page
    page_start: 1
    page_step: 1
    offset_start: 0
    link_header_require_results: false
