- name: all
  description: Gets a list of group or project members viewable by the authenticated user, including those who gained membership through ancestor group.
  filters:
  - name: id
    required: true
  - name: query
    required: false
  - name: user_ids
    required: false
  - name: show_seat_info
    required: false
  - name: state
    required: false
  - name: user_id
    required: false
  request:
    method: GET
    path: /api/v4/groups/{{filter.id}}/members/all
    query:
    - name: query
      from: filter
      key: query
    - name: user_ids
      explode: false
      from: filter
      key: user_ids
    - name: show_seat_info
      from: filter
      key: show_seat_info
    - name: state
      from: filter
      key: state
  requests:
  - when_filters:
    - id
    - user_id
    method: GET
    path: /api/v4/groups/{{filter.id}}/members/all/{{filter.user_id}}
  - when_filters:
    - id
    method: GET
    path: /api/v4/projects/{{filter.id}}/members/all
    query:
    - name: query
      from: filter
      key: query
    - name: user_ids
      explode: false
      from: filter
      key: user_ids
    - name: show_seat_info
      from: filter
      key: show_seat_info
    - name: state
      from: filter
      key: state
