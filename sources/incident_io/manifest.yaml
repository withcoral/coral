  description: ListWorkflows
  filters:
  - name: skip_step_upgrades
    required: false
  - name: id
    required: false
  request:
    method: GET
    path: /v2/workflows
  requests:
  - when_filters:
    - id
    method: GET
    path: /v2/workflows/{{filter.id}}
    query:
    - name: skip_step_upgrades
      from: filter
      key: skip_step_upgrades
  response:
    rows_path:
    - workflows
    allow_404_empty: false
