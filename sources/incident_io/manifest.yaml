dsl_version: 3
name: incident_io
version: 1.0.0
description: incident.io incident management platform API connector. Provides access to incidents, alerts, schedules, catalog, status pages, and more.
backend: http
base_url: https://api.incident.io
auth:
  headers:
    - name: Authorization
      from: template
      template: Bearer {{secret.INCIDENT_IO_API_KEY}}
tables:
- name: actions
  description: List
  filters:
  - name: incident_id
    required: false
  - name: incident_mode
    required: false
  - name: id
    required: false
  request:
    method: GET
    path: /v2/actions
    query:
    - name: incident_id
      from: filter
      key: incident_id
    - name: incident_mode
      from: filter
      key: incident_mode
  requests:
  - when_filters:
    - id
    method: GET
    path: /v2/actions/{{filter.id}}
  response:
    rows_path:
    - actions
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: cursor_query
    cursor_param: after
    response_cursor_path:
      - pagination_meta
      - after
  columns:
