    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - action
  - name: action__assignee
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - action
      - assignee
  - name: action__assignee__email
    type: Utf8
    nullable: true
    virtual: false
    description: Email address of the user.
    expr:
      kind: path
      path:
      - action
      - assignee
      - email
  - name: action__assignee__id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier of the user
    expr:
      kind: path
      path:
      - action
      - assignee
      - id
  - name: action__assignee__name
    type: Utf8
    nullable: true
    virtual: false
    description: Name of the user
    expr:
      kind: path
      path:
      - action
      - assignee
      - name
  - name: action__assignee__role
    type: Utf8
    nullable: true
    virtual: false
    description: 'DEPRECATED: Role of the user as of March 9th 2023, this value is no longer updated.'
    expr:
      kind: path
      path:
      - action
      - assignee
      - role
  - name: action__assignee__slack_user_id
    type: Utf8
    nullable: true
    virtual: false
    description: Slack ID of the user
    expr:
      kind: path
