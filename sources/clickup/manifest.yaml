dsl_version: 3
name: clickup
version: '2.0'
description: Manage tasks, spaces, folders, lists, goals, and time tracking
backend: http
base_url: https://api.clickup.com/api
auth:
  headers:
  - name: Authorization
    from: secret
    key: CLICKUP_API_TOKEN
tables:
- name: current
  description: Get running time entry
  filters:
  - name: team_id
    required: true
  - name: assignee
    required: false
  request:
    method: GET
    path: /v2/team/{{filter.team_id}}/time_entries/current
    query:
    - name: assignee
      explode: true
      from: filter
      key: assignee
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: assignee
    type: Float64
    nullable: true
    virtual: true
    description: user id
    expr:
      kind: from_filter
      key: assignee
