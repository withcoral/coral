- name: checkout_sessions
  description: List all Checkout Sessions
  filters:
  - name: created
    required: false
  - name: customer
    required: false
  - name: customer_account
    required: false
  - name: customer_details
    required: false
  - name: payment_intent
    required: false
  - name: payment_link
    required: false
  - name: status
    required: false
  - name: subscription
    required: false
  - name: session
    required: false
  request:
    method: GET
    path: /v1/checkout/sessions
    query:
    - name: created
      explode: true
      from: filter
      key: created
    - name: customer
      from: filter
      key: customer
    - name: customer_account
      from: filter
      key: customer_account
    - name: customer_details
      explode: true
      from: filter
      key: customer_details
    - name: payment_intent
      from: filter
      key: payment_intent
    - name: payment_link
      from: filter
      key: payment_link
    - name: status
      from: filter
      key: status
    - name: subscription
      from: filter
      key: subscription
  requests:
  - when_filters:
    - session
    method: GET
    path: /v1/checkout/sessions/{{filter.session}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: adaptive_pricing
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - adaptive_pricing
  - name: adaptive_pricing__enabled
    type: Boolean
    nullable: true
    virtual: false
    description: If enabled, Adaptive Pricing is available on [eligible sessions](https://docs.stripe.com/payments/currencies/localize-prices/adaptive-pricing?payment-ui=stripe-hosted#restrictions).
    expr:
      kind: path
