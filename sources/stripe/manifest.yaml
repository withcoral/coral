  - name: customer_phone
    type: Utf8
    nullable: true
    virtual: false
    description: The customer's phone number. Until the invoice is finalized, this field will equal `customer.phone`. Once the invoice is finalized, this field will no longer be updated.
    expr:
      kind: path
      path:
      - customer_phone
  - name: customer_shipping
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - customer_shipping
  - name: customer_shipping__address
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - customer_shipping
      - address
  - name: customer_shipping__address__city
    type: Utf8
    nullable: true
    virtual: false
    description: City, district, suburb, town, or village.
    expr:
      kind: path
      path:
      - customer_shipping
