- name: accounts
  description: List all connected accounts
  filters:
  - name: created
    required: false
  - name: account
    required: false
  request:
    method: GET
    path: /v1/accounts
    query:
    - name: created
      explode: true
      from: filter
      key: created
  requests:
  - when_filters:
    - account
    method: GET
    path: /v1/accounts/{{filter.account}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
