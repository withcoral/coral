- name: payment_method_configurations
  description: List payment method configurations
  filters:
  - name: application
    required: false
  - name: configuration
    required: false
  request:
    method: GET
    path: /v1/payment_method_configurations
    query:
    - name: application
      explode: true
      from: filter
      key: application
  requests:
  - when_filters:
    - configuration
    method: GET
    path: /v1/payment_method_configurations/{{filter.configuration}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: acss_debit
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - acss_debit
  - name: acss_debit__available
    type: Boolean
    nullable: true
    virtual: false
    description: Whether this payment method may be offered at checkout. True if `display_preference` is `on` and the payment method's capability is active.
    expr:
      kind: path
      path:
      - acss_debit
      - available
  - name: acss_debit__display_preference
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - acss_debit
      - display_preference
  - name: acss_debit__display_preference__overridable
    type: Boolean
    nullable: true
    virtual: false
    description: For child configs, whether or not the account's preference will be observed. If `false`, the parent configuration's default is used.
    expr:
      kind: path
      path:
      - acss_debit
      - display_preference
      - overridable
  - name: acss_debit__display_preference__preference
    type: Utf8
    nullable: true
    virtual: false
