- name: subscription_items
  description: List all subscription items
  filters:
  - name: subscription
    required: true
  - name: item
    required: false
  request:
    method: GET
    path: /v1/subscription_items
    query:
    - name: subscription
      from: filter
      key: subscription
  requests:
  - when_filters:
    - item
    method: GET
    path: /v1/subscription_items/{{filter.item}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: billing_thresholds
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - billing_thresholds
  - name: billing_thresholds__usage_gte
    type: Int64
    nullable: true
    virtual: false
    description: Usage threshold that triggers the subscription to create an invoice
    expr:
      kind: path
      path:
      - billing_thresholds
      - usage_gte
  - name: created
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - created
  - name: current_period_end
    type: Int64
    nullable: true
    virtual: false
    description: The end time of this subscription item's current billing period.
    expr:
      kind: path
      path:
      - current_period_end
  - name: current_period_start
    type: Int64
    nullable: true
    virtual: false
    description: The start time of this subscription item's current billing period.
    expr:
      kind: path
      path:
      - current_period_start
  - name: discounts
    type: Utf8
    nullable: true
    virtual: false
    description: The discounts applied to the subscription item. Subscription item discounts are applied before subscription discounts. Use `expand[]=discounts` to expand each discount.
    expr:
      kind: path
      path:
      - discounts
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - id
  - name: item
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: item
  - name: metadata
    type: Utf8
    nullable: true
    virtual: false
    description: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
    expr:
      kind: path
      path:
      - metadata
  - name: object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - object
  - name: price
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Prices define the unit cost, currency, and (optional) billing cycle for both recurring and one-time purchases of products.
      [Products](https://api.stripe.com#products) help you track inventory or provisioning, and prices help you track payment terms. Different physical goods or levels of service should be represented by products, and pricing options should be represented by prices. This approach lets you change prices without having to change your provisioning scheme.

      For example, you might have a single "gold" product that has prices for $10/month, $100/year, and €9 once.

      Related guides: [Set up a subscription](https://docs.stripe.com/billing/subscriptions/set-up-subscription), [create an invoice](https://docs.stripe.com/billing/invoices/create), and more about [products and prices](https://docs.stripe.com/products-prices/overview).
    expr:
      kind: path
      path:
      - price
  - name: quantity
    type: Int64
    nullable: true
    virtual: false
    description: The [quantity](https://docs.stripe.com/subscriptions/quantities) of the plan to which the customer should be subscribed.
    expr:
      kind: path
      path:
      - quantity
  - name: subscription
    type: Utf8
    nullable: true
    virtual: false
    description: The `subscription` this `subscription_item` belongs to.
    expr:
      kind: path
      path:
      - subscription
  - name: tax_rates
    type: Utf8
    nullable: true
    virtual: false
    description: The tax rates which apply to this `subscription_item`. When set, the `default_tax_rates` on the subscription do not apply to this `subscription_item`.
    expr:
      kind: path
      path:
      - tax_rates
