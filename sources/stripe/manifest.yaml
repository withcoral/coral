- name: issuing_disputes
  description: List all disputes
  filters:
  - name: created
    required: false
  - name: status
    required: false
  - name: transaction
    required: false
  - name: dispute
    required: false
  request:
    method: GET
    path: /v1/issuing/disputes
    query:
    - name: created
      explode: true
      from: filter
      key: created
    - name: status
      from: filter
      key: status
    - name: transaction
      from: filter
      key: transaction
  requests:
  - when_filters:
    - dispute
    method: GET
    path: /v1/issuing/disputes/{{filter.dispute}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount
    type: Int64
    nullable: true
    virtual: false
    description: Disputed amount in the card's currency and in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal). Usually the amount of the `transaction`, but can differ (usually because of currency fluctuation).
    expr:
      kind: path
      path:
      - amount
  - name: available_on
