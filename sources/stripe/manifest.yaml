    expr:
      kind: path
      path:
      - test_clock
- name: invoices
  description: List all invoices
  filters:
  - name: collection_method
    required: false
  - name: created
    required: false
  - name: customer
    required: false
  - name: customer_account
    required: false
  - name: due_date
    required: false
  - name: status
    required: false
  - name: subscription
    required: false
  - name: invoice
    required: false
  request:
    method: GET
    path: /v1/invoices
    query:
    - name: collection_method
      from: filter
      key: collection_method
    - name: created
      explode: true
      from: filter
      key: created
    - name: customer
      from: filter
      key: customer
    - name: customer_account
      from: filter
      key: customer_account
    - name: due_date
      explode: true
      from: filter
      key: due_date
    - name: status
      from: filter
      key: status
    - name: subscription
      from: filter
      key: subscription
  requests:
  - when_filters:
    - invoice
    method: GET
    path: /v1/invoices/{{filter.invoice}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: account_country
    type: Utf8
    nullable: true
    virtual: false
    description: The country of the business associated with this invoice, most often the business creating the invoice.
    expr:
      kind: path
      path:
      - account_country
  - name: account_name
    type: Utf8
    nullable: true
    virtual: false
    description: The public name of the business associated with this invoice, most often the business creating the invoice.
    expr:
      kind: path
      path:
      - account_name
  - name: account_tax_ids
    type: Utf8
    nullable: true
    virtual: false
    description: The account tax IDs associated with the invoice. Only editable when the invoice is a draft.
    expr:
      kind: path
      path:
      - account_tax_ids
  - name: amount_due
    type: Int64
    nullable: true
    virtual: false
    description: Final amount due at this time for this invoice. If the invoice's total is smaller than the minimum charge amount, for example, or if there is account credit that can be applied to the invoice, the `amount_due` may be 0. If there is a positive `starting_balance` for the invoice (the customer owes money), the `amount_due` will also take that into account. The charge that gets generated for the invoice will be for the amount specified in `amount_due`.
    expr:
      kind: path
      path:
      - amount_due
  - name: amount_overpaid
    type: Int64
    nullable: true
    virtual: false
    description: Amount that was overpaid on the invoice. The amount overpaid is credited to the customer's credit balance.
    expr:
      kind: path
      path:
      - amount_overpaid
  - name: amount_paid
    type: Int64
    nullable: true
    virtual: false
    description: The amount, in cents (or local equivalent), that was paid.
    expr:
      kind: path
      path:
      - amount_paid
  - name: amount_remaining
    type: Int64
    nullable: true
    virtual: false
    description: The difference between amount_due and amount_paid, in cents (or local equivalent).
    expr:
      kind: path
      path:
      - amount_remaining
  - name: amount_shipping
    type: Int64
    nullable: true
    virtual: false
    description: This is the sum of all the shipping amounts.
    expr:
      kind: path
      path:
      - amount_shipping
  - name: application
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - application
  - name: application__deleted
    type: Boolean
    nullable: true
    virtual: false
    description: Always true for a deleted object
    expr:
      kind: path
      path:
      - application
      - deleted
  - name: application__id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - application
      - id
  - name: application__name
    type: Utf8
    nullable: true
    virtual: false
    description: The name of the application.
    expr:
      kind: path
      path:
      - application
      - name
  - name: application__object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - application
      - object
  - name: attempt_count
    type: Int64
    nullable: true
    virtual: false
    description: Number of payment attempts made for this invoice, from the perspective of the payment retry schedule. Any payment attempt counts as the first attempt, and subsequently only automatic retries increment the attempt count. In other words, manual payment attempts after the first attempt do not affect the retry schedule. If a failure is returned with a non-retryable return code, the invoice can no longer be retried unless a new payment method is obtained. Retries will continue to be scheduled, and attempt_count will continue to increment, but retries will only be executed if a new payment method is obtained.
    expr:
      kind: path
      path:
      - attempt_count
  - name: attempted
    type: Boolean
    nullable: true
    virtual: false
    description: Whether an attempt has been made to pay the invoice. An invoice is not attempted until 1 hour after the `invoice.created` webhook, for example, so you might not want to display that invoice as unpaid to your users.
    expr:
      kind: path
      path:
      - attempted
  - name: auto_advance
    type: Boolean
    nullable: true
    virtual: false
    description: Controls whether Stripe performs [automatic collection](https://docs.stripe.com/invoicing/integration/automatic-advancement-collection) of the invoice. If `false`, the invoice's state doesn't automatically advance without an explicit action.
    expr:
      kind: path
      path:
      - auto_advance
  - name: automatic_tax
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - automatic_tax
  - name: automatic_tax__disabled_reason
    type: Utf8
    nullable: true
    virtual: false
    description: If Stripe disabled automatic tax, this enum describes why.
    expr:
      kind: path
      path:
      - automatic_tax
      - disabled_reason
  - name: automatic_tax__enabled
    type: Boolean
    nullable: true
    virtual: false
    description: Whether Stripe automatically computes tax on this invoice. Note that incompatible invoice items (invoice items with manually specified [tax rates](https://docs.stripe.com/api/tax_rates), negative amounts, or `tax_behavior=unspecified`) cannot be added to automatic tax invoices.
    expr:
      kind: path
      path:
      - automatic_tax
      - enabled
  - name: automatic_tax__liability
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - automatic_tax
      - liability
  - name: automatic_tax__liability__account
    type: Utf8
    nullable: true
    virtual: false
    description: The connected account being referenced when `type` is `account`.
    expr:
      kind: path
      path:
      - automatic_tax
      - liability
      - account
  - name: automatic_tax__liability__type
    type: Utf8
    nullable: true
    virtual: false
    description: Type of the account referenced.
    expr:
      kind: path
      path:
      - automatic_tax
      - liability
      - type
  - name: automatic_tax__provider
    type: Utf8
    nullable: true
    virtual: false
    description: The tax provider powering automatic tax.
    expr:
      kind: path
      path:
      - automatic_tax
      - provider
  - name: automatic_tax__status
    type: Utf8
    nullable: true
    virtual: false
    description: The status of the most recent automated tax calculation for this invoice.
    expr:
      kind: path
      path:
      - automatic_tax
      - status
  - name: automatically_finalizes_at
    type: Int64
    nullable: true
    virtual: false
    description: The time when this invoice is currently scheduled to be automatically finalized. The field will be `null` if the invoice is not scheduled to finalize in the future. If the invoice is not in the draft state, this field will always be `null` - see `finalized_at` for the time when an already-finalized invoice was finalized.
    expr:
      kind: path
      path:
      - automatically_finalizes_at
  - name: billing_reason
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Indicates the reason why the invoice was created.

      * `manual`: Unrelated to a subscription, for example, created via the invoice editor.
      * `subscription`: No longer in use. Applies to subscriptions from before May 2018 where no distinction was made between updates, cycles, and thresholds.
      * `subscription_create`: A new subscription was created.
      * `subscription_cycle`: A subscription advanced into a new period.
      * `subscription_threshold`: A subscription reached a billing threshold.
      * `subscription_update`: A subscription was updated.
      * `upcoming`: Reserved for upcoming invoices created through the Create Preview Invoice API or when an `invoice.upcoming` event is generated for an upcoming invoice on a subscription.
    expr:
      kind: path
      path:
      - billing_reason
  - name: collection_method
    type: Utf8
    nullable: true
    virtual: false
    description: Either `charge_automatically`, or `send_invoice`. When charging automatically, Stripe will attempt to pay this invoice using the default source attached to the customer. When sending an invoice, Stripe will email this invoice to the customer with payment instructions.
    expr:
      kind: path
      path:
      - collection_method
  - name: confirmation_secret
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - confirmation_secret
  - name: confirmation_secret__client_secret
    type: Utf8
    nullable: true
    virtual: false
    description: The client_secret of the payment that Stripe creates for the invoice after finalization.
    expr:
      kind: path
      path:
      - confirmation_secret
      - client_secret
  - name: confirmation_secret__type
    type: Utf8
    nullable: true
    virtual: false
    description: The type of client_secret. Currently this is always payment_intent, referencing the default payment_intent that Stripe creates during invoice finalization
    expr:
      kind: path
      path:
      - confirmation_secret
      - type
  - name: created
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - created
  - name: currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - currency
  - name: custom_fields
    type: Utf8
    nullable: true
    virtual: false
    description: Custom fields displayed on the invoice.
    expr:
      kind: path
      path:
      - custom_fields
  - name: customer
    type: Utf8
    nullable: true
    virtual: false
    description: The ID of the customer to bill.
    expr:
      kind: path
      path:
      - customer
  - name: customer_account
    type: Utf8
    nullable: true
    virtual: false
    description: The ID of the account representing the customer to bill.
    expr:
      kind: path
      path:
      - customer_account
  - name: customer_address
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - customer_address
  - name: customer_address__city
    type: Utf8
    nullable: true
