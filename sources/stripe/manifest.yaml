dsl_version: 3
name: stripe
version: 2026-03-25.dahlia
description: The Stripe REST API. Please see https://stripe.com/docs/api for more details.
backend: http
base_url: https://api.stripe.com
auth:
  headers:
    - name: Authorization
      from: template
      template: Bearer {{secret.STRIPE_API_KEY}}
tables:
- name: account
  description: Retrieve account
  request:
    method: GET
    path: /v1/account
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: business_profile
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - business_profile
  - name: business_profile__annual_revenue
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - business_profile
      - annual_revenue
  - name: business_profile__annual_revenue__amount
    type: Int64
    nullable: true
    virtual: false
    description: A non-negative integer representing the amount in the [smallest currency unit](/currencies#zero-decimal).
    expr:
      kind: path
      path:
      - business_profile
      - annual_revenue
      - amount
  - name: business_profile__annual_revenue__currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - business_profile
      - annual_revenue
      - currency
  - name: business_profile__annual_revenue__fiscal_year_end
    type: Utf8
    nullable: true
    virtual: false
    description: The close-out date of the preceding fiscal year in ISO 8601 format. E.g. 2023-12-31 for the 31st of December, 2023.
    expr:
      kind: path
      path:
      - business_profile
      - annual_revenue
      - fiscal_year_end
  - name: business_profile__estimated_worker_count
    type: Int64
    nullable: true
    virtual: false
    description: An estimated upper bound of employees, contractors, vendors, etc. currently working for the business.
    expr:
      kind: path
      path:
      - business_profile
      - estimated_worker_count
  - name: business_profile__mcc
    type: Utf8
    nullable: true
    virtual: false
    description: '[The merchant category code for the account](/connect/setting-mcc). MCCs are used to classify businesses based on the goods or services they provide.'
    expr:
      kind: path
      path:
      - business_profile
      - mcc
  - name: business_profile__minority_owned_business_designation
    type: Utf8
    nullable: true
    virtual: false
    description: Whether the business is a minority-owned, women-owned, and/or LGBTQI+ -owned business.
    expr:
      kind: path
      path:
      - business_profile
      - minority_owned_business_designation
  - name: business_profile__monthly_estimated_revenue
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - business_profile
      - monthly_estimated_revenue
  - name: business_profile__monthly_estimated_revenue__amount
    type: Int64
    nullable: true
    virtual: false
    description: A non-negative integer representing how much to charge in the [smallest currency unit](/currencies#zero-decimal).
    expr:
      kind: path
      path:
      - business_profile
      - monthly_estimated_revenue
      - amount
  - name: business_profile__monthly_estimated_revenue__currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - business_profile
      - monthly_estimated_revenue
      - currency
  - name: business_profile__name
    type: Utf8
    nullable: true
    virtual: false
    description: The customer-facing business name.
    expr:
      kind: path
      path:
      - business_profile
      - name
  - name: business_profile__product_description
    type: Utf8
    nullable: true
    virtual: false
    description: Internal-only description of the product sold or service provided by the business. It's used by Stripe for risk and underwriting purposes.
    expr:
      kind: path
      path:
      - business_profile
      - product_description
  - name: business_profile__support_address
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - business_profile
      - support_address
  - name: business_profile__support_address__city
    type: Utf8
    nullable: true
    virtual: false
    description: City, district, suburb, town, or village.
    expr:
      kind: path
      path:
      - business_profile
      - support_address
      - city
  - name: business_profile__support_address__country
    type: Utf8
    nullable: true
    virtual: false
    description: Two-letter country code ([ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)).
