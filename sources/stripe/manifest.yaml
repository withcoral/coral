      - postal_code
  - name: customer_address__state
    type: Utf8
    nullable: true
    virtual: false
    description: State, county, province, or region ([ISO 3166-2](https://en.wikipedia.org/wiki/ISO_3166-2)).
    expr:
      kind: path
      path:
      - customer_address
