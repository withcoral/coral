- name: payouts
  description: List all payouts
  filters:
  - name: arrival_date
    required: false
  - name: created
    required: false
  - name: destination
    required: false
  - name: status
    required: false
  - name: payout
    required: false
  request:
    method: GET
    path: /v1/payouts
    query:
    - name: arrival_date
      explode: true
      from: filter
      key: arrival_date
    - name: created
      explode: true
      from: filter
      key: created
    - name: destination
      from: filter
      key: destination
    - name: status
      from: filter
      key: status
  requests:
  - when_filters:
    - payout
    method: GET
    path: /v1/payouts/{{filter.payout}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount
    type: Int64
    nullable: true
    virtual: false
    description: The amount (in cents (or local equivalent)) that transfers to your bank account or debit card.
    expr:
      kind: path
      path:
      - amount
  - name: application_fee
    type: Utf8
    nullable: true
    virtual: false
    description: The application fee (if any) for the payout. [See the Connect documentation](https://docs.stripe.com/connect/instant-payouts#monetization-and-fees) for details.
    expr:
      kind: path
      path:
      - application_fee
  - name: application_fee_amount
    type: Int64
    nullable: true
    virtual: false
    description: The amount of the application fee (if any) requested for the payout. [See the Connect documentation](https://docs.stripe.com/connect/instant-payouts#monetization-and-fees) for details.
    expr:
      kind: path
      path:
      - application_fee_amount
  - name: arrival_date
    type: Int64
    nullable: true
    virtual: false
    description: Date that you can expect the payout to arrive in the bank. This factors in delays to account for weekends or bank holidays.
    expr:
      kind: path
      path:
      - arrival_date
  - name: automatic
    type: Boolean
    nullable: true
    virtual: false
    description: Returns `true` if the payout is created by an [automated payout schedule](https://docs.stripe.com/payouts#payout-schedule) and `false` if it's [requested manually](https://stripe.com/docs/payouts#manual-payouts).
    expr:
      kind: path
      path:
      - automatic
  - name: balance_transaction
    type: Utf8
    nullable: true
    virtual: false
    description: ID of the balance transaction that describes the impact of this payout on your account balance.
    expr:
      kind: path
      path:
      - balance_transaction
