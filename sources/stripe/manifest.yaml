  - name: application_fee_amount
    type: Int64
    nullable: true
    virtual: false
    description: The amount of the application fee (if any) that will be requested to be applied to the payment and transferred to the application owner's Stripe account. The amount of the application fee collected will be capped at the total amount captured. For more information, see the PaymentIntents [use case for connected accounts](https://docs.stripe.com/payments/connected-accounts).
    expr:
      kind: path
      path:
      - application_fee_amount
  - name: automatic_payment_methods
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - automatic_payment_methods
  - name: automatic_payment_methods__allow_redirects
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Controls whether this PaymentIntent will accept redirect-based payment methods.

      Redirect-based payment methods may require your customer to be redirected to a payment method's app or site for authentication or additional steps. To [confirm](https://docs.stripe.com/api/payment_intents/confirm) this PaymentIntent, you may be required to provide a `return_url` to redirect customers back to your site after they authenticate or complete the payment.
    expr:
      kind: path
      path:
      - automatic_payment_methods
      - allow_redirects
  - name: automatic_payment_methods__enabled
    type: Boolean
    nullable: true
    virtual: false
    description: Automatically calculates compatible payment methods
