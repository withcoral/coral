  - name: lifecycle_controls__cancel_after__payment_count
    type: Int64
    nullable: true
    virtual: false
    description: The card is automatically cancelled when it makes this number of non-zero payment authorizations and transactions. The count includes penny authorizations, but doesn't include non-payment actions, such as authorization advice.
    expr:
      kind: path
      path:
      - lifecycle_controls
      - cancel_after
      - payment_count
  - name: livemode
    type: Boolean
    nullable: true
    virtual: false
    description: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    expr:
      kind: path
      path:
      - livemode
  - name: metadata
    type: Utf8
    nullable: true
    virtual: false
    description: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
