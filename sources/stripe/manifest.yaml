    required: false
  - name: invoice_payment
    required: false
  request:
    method: GET
    path: /v1/invoice_payments
    query:
    - name: created
      explode: true
      from: filter
      key: created
    - name: invoice
      from: filter
      key: invoice
    - name: payment
      explode: true
      from: filter
      key: payment
