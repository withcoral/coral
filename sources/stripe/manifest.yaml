    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount_paid
    type: Int64
    nullable: true
    virtual: false
    description: Amount that was actually paid for this invoice, in cents (or local equivalent). This field is null until the payment is `paid`. This amount can be less than the `amount_requested` if the PaymentIntent’s `amount_received` is not sufficient to pay all of the invoices that it is attached to.
    expr:
      kind: path
      path:
      - amount_paid
  - name: amount_requested
    type: Int64
    nullable: true
    virtual: false
    description: Amount intended to be paid toward this invoice, in cents (or local equivalent)
    expr:
      kind: path
      path:
      - amount_requested
  - name: created
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - created
  - name: currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - currency
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - id
  - name: invoice
    type: Utf8
    nullable: true
    virtual: false
    description: The invoice that was paid.
    expr:
      kind: path
      path:
      - invoice
  - name: invoice_payment
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: invoice_payment
  - name: is_default
    type: Boolean
    nullable: true
    virtual: false
    description: Stripe automatically creates a default InvoicePayment when the invoice is finalized, and keeps it synchronized with the invoice’s `amount_remaining`. The PaymentIntent associated with the default payment can’t be edited or canceled directly.
    expr:
      kind: path
      path:
      - is_default
  - name: livemode
    type: Boolean
    nullable: true
    virtual: false
    description: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    expr:
      kind: path
      path:
      - livemode
  - name: object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - object
  - name: payment
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - payment
  - name: payment__charge
    type: Utf8
    nullable: true
    virtual: false
    description: 'ID of the successful charge for this payment when `type` is `charge`.Note: charge is only surfaced if the charge object is not associated with a payment intent. If the charge object does have a payment intent, the Invoice Payment surfaces the payment intent instead.'
