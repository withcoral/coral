      - support_address
      - line1
  - name: business_profile__support_address__line2
    type: Utf8
    nullable: true
    virtual: false
    description: Address line 2, such as the apartment, suite, unit, or building.
    expr:
      kind: path
      path:
      - business_profile
      - support_address
      - line2
  - name: business_profile__support_address__postal_code
    type: Utf8
    nullable: true
    virtual: false
