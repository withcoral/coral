  - name: lifecycle_controls
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - lifecycle_controls
  - name: lifecycle_controls__cancel_after
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - lifecycle_controls
