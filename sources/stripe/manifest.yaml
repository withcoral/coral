- name: country_specs
  description: List Country Specs
  filters:
  - name: country
    required: false
  request:
    method: GET
    path: /v1/country_specs
  requests:
  - when_filters:
    - country
    method: GET
    path: /v1/country_specs/{{filter.country}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: country
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: country
  - name: default_currency
    type: Utf8
    nullable: true
    virtual: false
    description: The default currency for this country. This applies to both payment methods and bank accounts.
    expr:
      kind: path
      path:
      - default_currency
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object. Represented as the ISO country code for this country.
    expr:
      kind: path
      path:
      - id
  - name: object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - object
  - name: supported_bank_account_currencies
    type: Utf8
    nullable: true
    virtual: false
    description: Currencies that can be accepted in the specific country (for transfers).
    expr:
      kind: path
      path:
      - supported_bank_account_currencies
  - name: supported_payment_currencies
    type: Utf8
    nullable: true
    virtual: false
    description: Currencies that can be accepted in the specified country (for payments).
    expr:
      kind: path
      path:
      - supported_payment_currencies
  - name: supported_payment_methods
    type: Utf8
    nullable: true
    virtual: false
    description: Payment methods available in the specified country. You may need to enable some payment methods (e.g., [ACH](https://stripe.com/docs/ach)) on your account before they appear in this list. The `stripe` payment method refers to [charging through your platform](https://stripe.com/docs/connect/destination-charges).
    expr:
      kind: path
      path:
      - supported_payment_methods
  - name: supported_transfer_countries
    type: Utf8
    nullable: true
    virtual: false
    description: Countries that can accept transfers from the specified country.
    expr:
      kind: path
      path:
      - supported_transfer_countries
  - name: verification_fields
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - verification_fields
  - name: verification_fields__company
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - verification_fields
      - company
  - name: verification_fields__company__additional
    type: Utf8
    nullable: true
