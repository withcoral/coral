  - name: after_expiration__recovery
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - after_expiration
      - recovery
  - name: after_expiration__recovery__allow_promotion_codes
    type: Boolean
    nullable: true
    virtual: false
    description: Enables user redeemable promotion codes on the recovered Checkout Sessions. Defaults to `false`
    expr:
      kind: path
      path:
      - after_expiration
      - recovery
      - allow_promotion_codes
  - name: after_expiration__recovery__enabled
    type: Boolean
    nullable: true
    virtual: false
    description: |-
      If `true`, a recovery url will be generated to recover this Checkout Session if it
      expires before a transaction is completed. It will be attached to the
      Checkout Session object upon expiration.
    expr:
      kind: path
      path:
      - after_expiration
      - recovery
      - enabled
  - name: after_expiration__recovery__expires_at
    type: Int64
    nullable: true
    virtual: false
    description: The timestamp at which the recovery URL will expire.
    expr:
      kind: path
      path:
      - after_expiration
      - recovery
