      - payment
      - charge
  - name: payment__payment_intent
    type: Utf8
    nullable: true
    virtual: false
    description: 'ID of the PaymentIntent associated with this payment when `type` is `payment_intent`. Note: This property is only populated for invoices finalized on or after March 15th, 2019.'
    expr:
      kind: path
      path:
      - payment
      - payment_intent
  - name: payment__payment_record
    type: Utf8
    nullable: true
    virtual: false
    description: ID of the PaymentRecord associated with this payment when `type` is `payment_record`.
    expr:
      kind: path
      path:
      - payment
      - payment_record
  - name: payment__type
    type: Utf8
    nullable: true
    virtual: false
    description: Type of payment object associated with this invoice payment.
    expr:
      kind: path
      path:
      - payment
      - type
  - name: status
    type: Utf8
    nullable: true
    virtual: false
    description: The status of the payment, one of `open`, `paid`, or `canceled`.
    expr:
      kind: path
      path:
      - status
  - name: status_transitions
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - status_transitions
  - name: status_transitions__canceled_at
    type: Int64
    nullable: true
    virtual: false
    description: The time that the payment was canceled.
    expr:
      kind: path
      path:
      - status_transitions
      - canceled_at
  - name: status_transitions__paid_at
    type: Int64
    nullable: true
    virtual: false
    description: The time that the payment succeeded.
    expr:
      kind: path
      path:
      - status_transitions
      - paid_at
