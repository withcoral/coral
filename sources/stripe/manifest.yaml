- name: active_entitlements
  description: List all active entitlements
  filters:
  - name: customer
    required: true
  - name: id
    required: false
  request:
    method: GET
    path: /v1/entitlements/active_entitlements
    query:
    - name: customer
      from: filter
      key: customer
  requests:
  - when_filters:
    - id
    method: GET
    path: /v1/entitlements/active_entitlements/{{filter.id}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: customer
    type: Utf8
    nullable: true
    virtual: true
    description: The ID of the customer.
    expr:
      kind: from_filter
      key: customer
  - name: feature
    type: Utf8
    nullable: true
    virtual: false
    description: The [Feature](https://docs.stripe.com/api/entitlements/feature) that the customer is entitled to.
    expr:
      kind: path
      path:
      - feature
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - id
  - name: livemode
    type: Boolean
    nullable: true
    virtual: false
    description: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    expr:
      kind: path
      path:
      - livemode
  - name: lookup_key
    type: Utf8
    nullable: true
    virtual: false
    description: A unique key you provide as your own system identifier. This may be up to 80 characters.
    expr:
      kind: path
      path:
      - lookup_key
  - name: object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - object
