      - status
  - name: usage
    type: Utf8
    nullable: true
    virtual: false
    description: The value of [usage](https://docs.stripe.com/api/setup_intents/object#setup_intent_object-usage) on the SetupIntent at the time of this confirmation, one of `off_session` or `on_session`.
    expr:
      kind: path
      path:
      - usage
- name: setup_intents
  description: List all SetupIntents
  filters:
  - name: attach_to_self
    required: false
  - name: created
    required: false
  - name: customer
    required: false
  - name: customer_account
    required: false
  - name: payment_method
    required: false
  - name: client_secret
    required: false
  - name: intent
    required: false
  request:
    method: GET
    path: /v1/setup_intents
    query:
    - name: attach_to_self
      from: filter
      key: attach_to_self
    - name: created
      explode: true
      from: filter
      key: created
    - name: customer
      from: filter
      key: customer
    - name: customer_account
      from: filter
      key: customer_account
    - name: payment_method
      from: filter
      key: payment_method
  requests:
  - when_filters:
    - intent
    method: GET
    path: /v1/setup_intents/{{filter.intent}}
    query:
    - name: client_secret
      from: filter
      key: client_secret
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: application
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - application
  - name: application__id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - application
      - id
  - name: application__name
    type: Utf8
    nullable: true
    virtual: false
    description: The name of the application.
    expr:
      kind: path
      path:
      - application
      - name
  - name: application__object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - application
      - object
  - name: attach_to_self
    type: Boolean
    nullable: true
    virtual: false
    description: |-
      If present, the SetupIntent's payment method will be attached to the in-context Stripe Account.

      It can only be used for this Stripe Account’s own money movement flows like InboundTransfer and OutboundTransfers. It cannot be set to true when setting up a PaymentMethod for a Customer, and defaults to false when attaching a PaymentMethod to a Customer.
    expr:
      kind: path
      path:
      - attach_to_self
  - name: automatic_payment_methods
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - automatic_payment_methods
  - name: automatic_payment_methods__allow_redirects
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Controls whether this SetupIntent will accept redirect-based payment methods.

      Redirect-based payment methods may require your customer to be redirected to a payment method's app or site for authentication or additional steps. To [confirm](https://docs.stripe.com/api/setup_intents/confirm) this SetupIntent, you may be required to provide a `return_url` to redirect customers back to your site after they authenticate or complete the setup.
    expr:
      kind: path
      path:
      - automatic_payment_methods
      - allow_redirects
  - name: automatic_payment_methods__enabled
    type: Boolean
    nullable: true
    virtual: false
    description: Automatically calculates compatible payment methods
    expr:
      kind: path
      path:
      - automatic_payment_methods
      - enabled
  - name: cancellation_reason
    type: Utf8
    nullable: true
    virtual: false
    description: Reason for cancellation of this SetupIntent, one of `abandoned`, `requested_by_customer`, or `duplicate`.
    expr:
      kind: path
      path:
      - cancellation_reason
  - name: client_secret
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      The client secret of this SetupIntent. Used for client-side retrieval using a publishable key.

      The client secret can be used to complete payment setup from your frontend. It should not be stored, logged, or exposed to anyone other than the customer. Make sure that you have TLS enabled on any page that includes the client secret.
    expr:
      kind: path
      path:
      - client_secret
  - name: created
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - created
  - name: customer
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      ID of the Customer this SetupIntent belongs to, if one exists.

      If present, the SetupIntent's payment method will be attached to the Customer on successful setup. Payment methods attached to other Customers cannot be used with this SetupIntent.
    expr:
      kind: path
      path:
      - customer
  - name: customer_account
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      ID of the Account this SetupIntent belongs to, if one exists.

      If present, the SetupIntent's payment method will be attached to the Account on successful setup. Payment methods attached to other Accounts cannot be used with this SetupIntent.
    expr:
      kind: path
      path:
      - customer_account
  - name: description
    type: Utf8
    nullable: true
    virtual: false
    description: An arbitrary string attached to the object. Often useful for displaying to users.
    expr:
      kind: path
      path:
      - description
  - name: excluded_payment_method_types
    type: Utf8
    nullable: true
    virtual: false
    description: Payment method types that are excluded from this SetupIntent.
    expr:
      kind: path
      path:
      - excluded_payment_method_types
  - name: flow_directions
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Indicates the directions of money movement for which this payment method is intended to be used.

      Include `inbound` if you intend to use the payment method as the origin to pull funds from. Include `outbound` if you intend to use the payment method as the destination to send funds to. You can include both if you intend to use the payment method for both purposes.
    expr:
      kind: path
      path:
      - flow_directions
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - id
  - name: intent
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: intent
