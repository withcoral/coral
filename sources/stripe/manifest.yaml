- name: charges
  description: List all charges
  filters:
  - name: created
    required: false
  - name: customer
    required: false
  - name: payment_intent
    required: false
  - name: transfer_group
    required: false
  - name: charge
    required: false
  request:
    method: GET
    path: /v1/charges
    query:
    - name: created
      explode: true
      from: filter
      key: created
    - name: customer
      from: filter
      key: customer
    - name: payment_intent
