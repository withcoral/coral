- name: customer_subscriptions
  description: List active subscriptions
  filters:
  - name: customer
    required: true
  - name: subscription_exposed_id
    required: false
  request:
    method: GET
    path: /v1/customers/{{filter.customer}}/subscriptions
  requests:
  - when_filters:
    - customer
    - subscription_exposed_id
    method: GET
    path: /v1/customers/{{filter.customer}}/subscriptions/{{filter.subscription_exposed_id}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: application
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - application
  - name: application__deleted
    type: Boolean
    nullable: true
    virtual: false
    description: Always true for a deleted object
    expr:
      kind: path
      path:
      - application
      - deleted
  - name: application__id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - application
      - id
  - name: application__name
    type: Utf8
    nullable: true
    virtual: false
    description: The name of the application.
    expr:
      kind: path
      path:
      - application
      - name
  - name: application__object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - application
      - object
  - name: application_fee_percent
    type: Float64
    nullable: true
    virtual: false
    description: A non-negative decimal between 0 and 100, with at most two decimal places. This represents the percentage of the subscription invoice total that will be transferred to the application owner's Stripe account.
    expr:
      kind: path
      path:
      - application_fee_percent
  - name: automatic_tax
    type: Utf8
    nullable: true
    virtual: false
