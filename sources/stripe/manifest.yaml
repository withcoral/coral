- name: account_bank_accounts
  description: Retrieve an external account
  filters:
  - name: account
    required: true
  - name: id
    required: true
  request:
    method: GET
    path: /v1/accounts/{{filter.account}}/bank_accounts/{{filter.id}}
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: account
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - account
  - name: account_holder_name
    type: Utf8
    nullable: true
    virtual: false
    description: The name of the person or business that owns the bank account.
    expr:
      kind: path
      path:
      - account_holder_name
  - name: account_holder_type
    type: Utf8
    nullable: true
    virtual: false
    description: The type of entity that holds the account. This can be either `individual` or `company`.
    expr:
      kind: path
      path:
      - account_holder_type
  - name: account_type
    type: Utf8
    nullable: true
    virtual: false
    description: The bank account type. This can only be `checking` or `savings` in most countries. In Japan, this can only be `futsu` or `toza`.
    expr:
      kind: path
      path:
      - account_type
  - name: address_city
    type: Utf8
    nullable: true
    virtual: false
    description: City/District/Suburb/Town/Village.
    expr:
      kind: path
      path:
      - address_city
  - name: address_country
    type: Utf8
    nullable: true
    virtual: false
    description: Billing address country, if provided when creating card.
    expr:
      kind: path
      path:
      - address_country
  - name: address_line1
    type: Utf8
    nullable: true
    virtual: false
    description: Address line 1 (Street address/PO Box/Company name).
    expr:
      kind: path
      path:
      - address_line1
  - name: address_line1_check
    type: Utf8
    nullable: true
    virtual: false
    description: 'If `address_line1` was provided, results of the check: `pass`, `fail`, `unavailable`, or `unchecked`.'
    expr:
      kind: path
      path:
      - address_line1_check
  - name: address_line2
    type: Utf8
    nullable: true
    virtual: false
    description: Address line 2 (Apartment/Suite/Unit/Building).
    expr:
      kind: path
      path:
      - address_line2
  - name: address_state
    type: Utf8
    nullable: true
    virtual: false
    description: State/County/Province/Region.
    expr:
      kind: path
      path:
      - address_state
  - name: address_zip
    type: Utf8
    nullable: true
    virtual: false
    description: ZIP or postal code.
    expr:
      kind: path
      path:
      - address_zip
  - name: address_zip_check
    type: Utf8
    nullable: true
    virtual: false
    description: 'If `address_zip` was provided, results of the check: `pass`, `fail`, `unavailable`, or `unchecked`.'
    expr:
      kind: path
      path:
      - address_zip_check
  - name: allow_redisplay
    type: Utf8
    nullable: true
    virtual: false
    description: This field indicates whether this payment method can be shown again to its customer in a checkout flow. Stripe products such as Checkout and Elements use this field to determine whether a payment method can be shown as a saved payment method in a checkout flow. The field defaults to “unspecified”.
    expr:
      kind: path
      path:
      - allow_redisplay
  - name: available_payout_methods
    type: Utf8
    nullable: true
    virtual: false
    description: A set of available payout methods for this card. Only values from this set should be passed as the `method` when creating a payout.
    expr:
      kind: path
      path:
      - available_payout_methods
  - name: bank_name
    type: Utf8
    nullable: true
    virtual: false
    description: Name of the bank associated with the routing number (e.g., `WELLS FARGO`).
    expr:
      kind: path
      path:
      - bank_name
  - name: brand
    type: Utf8
    nullable: true
    virtual: false
    description: Card brand. Can be `American Express`, `Cartes Bancaires`, `Diners Club`, `Discover`, `Eftpos Australia`, `Girocard`, `JCB`, `MasterCard`, `UnionPay`, `Visa`, or `Unknown`.
    expr:
      kind: path
      path:
      - brand
  - name: country
    type: Utf8
    nullable: true
    virtual: false
    description: Two-letter ISO code representing the country of the card. You could use this attribute to get a sense of the international breakdown of cards you've collected.
    expr:
      kind: path
      path:
      - country
  - name: currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO code for currency](https://www.iso.org/iso-4217-currency-codes.html) in lowercase. Must be a [supported currency](https://docs.stripe.com/currencies). Only applicable on accounts (not customers or recipients). The card can be used as a transfer destination for funds in this currency. This property is only available when returned as an [External Account](/api/external_account_cards/object) where [controller.is_controller](/api/accounts/object#account_object-controller-is_controller) is `true`.
    expr:
      kind: path
      path:
      - currency
  - name: customer
    type: Utf8
    nullable: true
    virtual: false
    description: The customer that this card belongs to. This attribute will not be in the card object if the card belongs to an account or recipient instead.
    expr:
      kind: path
      path:
      - customer
  - name: cvc_check
    type: Utf8
    nullable: true
    virtual: false
    description: 'If a CVC was provided, results of the check: `pass`, `fail`, `unavailable`, or `unchecked`. A result of unchecked indicates that CVC was provided but hasn''t been checked yet. Checks are typically performed when attaching a card to a Customer object, or when creating a charge. For more details, see [Check if a card is valid without a charge](https://support.stripe.com/questions/check-if-a-card-is-valid-without-a-charge).'
    expr:
      kind: path
      path:
      - cvc_check
  - name: default_for_currency
    type: Boolean
    nullable: true
    virtual: false
    description: Whether this card is the default external account for its currency. This property is only available for accounts where [controller.requirement_collection](/api/accounts/object#account_object-controller-requirement_collection) is `application`, which includes Custom accounts.
    expr:
      kind: path
      path:
      - default_for_currency
  - name: dynamic_last4
    type: Utf8
    nullable: true
    virtual: false
    description: (For tokenized numbers only.) The last four digits of the device account number.
    expr:
      kind: path
      path:
      - dynamic_last4
  - name: exp_month
    type: Int64
    nullable: true
    virtual: false
    description: Two-digit number representing the card's expiration month.
    expr:
      kind: path
      path:
      - exp_month
  - name: exp_year
    type: Int64
    nullable: true
    virtual: false
    description: Four-digit number representing the card's expiration year.
    expr:
      kind: path
      path:
      - exp_year
  - name: fingerprint
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      Uniquely identifies this particular card number. You can use this attribute to check whether two customers who’ve signed up with you are using the same card number, for example. For payment methods that tokenize card information (Apple Pay, Google Pay), the tokenized number might be provided instead of the underlying card number.

      *As of May 1, 2021, card fingerprint in India for Connect changed to allow two fingerprints for the same card---one for India and one for the rest of the world.*
    expr:
      kind: path
      path:
      - fingerprint
  - name: funding
    type: Utf8
    nullable: true
    virtual: false
    description: Card funding type. Can be `credit`, `debit`, `prepaid`, or `unknown`.
    expr:
      kind: path
      path:
      - funding
  - name: future_requirements
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - future_requirements
  - name: future_requirements__currently_due
    type: Utf8
    nullable: true
    virtual: false
    description: Fields that need to be resolved to keep the external account enabled. If not resolved by `current_deadline`, these fields will appear in `past_due` as well, and the account is disabled.
    expr:
      kind: path
      path:
      - future_requirements
      - currently_due
  - name: future_requirements__errors
    type: Utf8
    nullable: true
    virtual: false
    description: Details about validation and verification failures for `due` requirements that must be resolved.
    expr:
      kind: path
      path:
      - future_requirements
      - errors
  - name: future_requirements__past_due
    type: Utf8
