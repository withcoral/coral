- name: plans
  description: List all plans
  filters:
  - name: active
    required: false
  - name: created
    required: false
  - name: product
    required: false
  - name: plan
    required: false
  request:
    method: GET
    path: /v1/plans
    query:
    - name: active
      from: filter
      key: active
    - name: created
      explode: true
      from: filter
      key: created
    - name: product
      from: filter
      key: product
  requests:
  - when_filters:
    - plan
    method: GET
    path: /v1/plans/{{filter.plan}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: active
    type: Boolean
    nullable: true
    virtual: false
    description: Whether the plan can be used for new purchases.
    expr:
      kind: path
      path:
      - active
  - name: amount
    type: Int64
    nullable: true
    virtual: false
    description: The unit amount in cents (or local equivalent) to be charged, represented as a whole integer if possible. Only set if `billing_scheme=per_unit`.
    expr:
      kind: path
      path:
      - amount
  - name: amount_decimal
    type: Utf8
    nullable: true
    virtual: false
    description: The unit amount in cents (or local equivalent) to be charged, represented as a decimal string with at most 12 decimal places. Only set if `billing_scheme=per_unit`.
    expr:
      kind: path
      path:
      - amount_decimal
  - name: billing_scheme
    type: Utf8
    nullable: true
    virtual: false
    description: Describes how to compute the price per period. Either `per_unit` or `tiered`. `per_unit` indicates that the fixed amount (specified in `amount`) will be charged per unit in `quantity` (for plans with `usage_type=licensed`), or per unit of total usage (for plans with `usage_type=metered`). `tiered` indicates that the unit pricing will be computed using a tiering strategy as defined using the `tiers` and `tiers_mode` attributes.
    expr:
      kind: path
      path:
      - billing_scheme
  - name: created
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - created
  - name: currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - currency
  - name: flat_amount
    type: Int64
    nullable: true
    virtual: false
    description: Price for the entire tier.
    expr:
      kind: path
      path:
      - flat_amount
  - name: flat_amount_decimal
    type: Utf8
    nullable: true
    virtual: false
    description: Same as `flat_amount`, but contains a decimal value with at most 12 decimal places.
    expr:
      kind: path
      path:
      - flat_amount_decimal
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - id
  - name: interval
    type: Utf8
    nullable: true
    virtual: false
    description: The frequency at which a subscription is billed. One of `day`, `week`, `month` or `year`.
    expr:
      kind: path
      path:
      - interval
  - name: interval_count
    type: Int64
    nullable: true
    virtual: false
    description: The number of intervals (specified in the `interval` attribute) between subscription billings. For example, `interval=month` and `interval_count=3` bills every 3 months.
    expr:
      kind: path
      path:
      - interval_count
  - name: livemode
    type: Boolean
    nullable: true
    virtual: false
    description: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    expr:
      kind: path
      path:
      - livemode
  - name: metadata
    type: Utf8
    nullable: true
    virtual: false
    description: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
    expr:
      kind: path
      path:
      - metadata
  - name: meter
    type: Utf8
    nullable: true
    virtual: false
    description: The meter tracking the usage of a metered price
    expr:
      kind: path
      path:
      - meter
  - name: nickname
    type: Utf8
    nullable: true
    virtual: false
    description: A brief description of the plan, hidden from customers.
    expr:
      kind: path
      path:
      - nickname
  - name: object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value.
    expr:
      kind: path
      path:
      - object
  - name: plan
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: plan
  - name: product
    type: Utf8
    nullable: true
    virtual: false
    description: The product whose pricing this plan determines.
    expr:
      kind: path
      path:
      - product
  - name: tiers
    type: Utf8
    nullable: true
    virtual: false
    description: Each element represents a pricing tier. This parameter requires `billing_scheme` to be set to `tiered`. See also the documentation for `billing_scheme`.
    expr:
      kind: path
      path:
      - tiers
  - name: tiers_mode
    type: Utf8
    nullable: true
    virtual: false
    description: Defines if the tiering price should be `graduated` or `volume` based. In `volume`-based tiering, the maximum quantity within a period determines the per unit price. In `graduated` tiering, pricing can change as the quantity grows.
    expr:
      kind: path
      path:
      - tiers_mode
  - name: transform_usage
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - transform_usage
  - name: transform_usage__divide_by
    type: Int64
    nullable: true
    virtual: false
    description: Divide usage by this number.
    expr:
      kind: path
      path:
      - transform_usage
      - divide_by
  - name: transform_usage__round
    type: Utf8
    nullable: true
    virtual: false
    description: After division, either round the result `up` or `down`.
    expr:
      kind: path
      path:
      - transform_usage
      - round
  - name: trial_period_days
    type: Int64
    nullable: true
    virtual: false
    description: Default number of trial days when subscribing a customer to this plan using [`trial_from_plan=true`](https://docs.stripe.com/api#create_subscription-trial_from_plan).
    expr:
      kind: path
      path:
      - trial_period_days
  - name: unit_amount
    type: Int64
    nullable: true
    virtual: false
    description: Per unit price for units relevant to the tier.
    expr:
      kind: path
      path:
      - unit_amount
  - name: unit_amount_decimal
    type: Utf8
    nullable: true
    virtual: false
    description: Same as `unit_amount`, but contains a decimal value with at most 12 decimal places.
    expr:
      kind: path
      path:
      - unit_amount_decimal
  - name: up_to
    type: Int64
    nullable: true
    virtual: false
    description: Up to and including to this quantity will be contained in the tier.
    expr:
      kind: path
      path:
      - up_to
  - name: usage_type
    type: Utf8
    nullable: true
    virtual: false
    description: Configures how the quantity per period should be determined. Can be either `metered` or `licensed`. `licensed` automatically bills the `quantity` set when adding it to a subscription. `metered` aggregates the total usage based on usage records. Defaults to `licensed`.
    expr:
      kind: path
      path:
      - usage_type
