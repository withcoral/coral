- name: payment_records
  description: Retrieve a Payment Record
  filters:
  - name: id
    required: true
  request:
    method: GET
    path: /v1/payment_records/{{filter.id}}
  response:
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount
    type: Utf8
    nullable: true
    virtual: false
    description: A representation of an amount of money, consisting of an amount and a currency.
    expr:
      kind: path
      path:
      - amount
  - name: amount__currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - amount
      - currency
  - name: amount__value
    type: Int64
    nullable: true
    virtual: false
    description: A positive integer representing the amount in the currency's [minor unit](https://docs.stripe.com/currencies#zero-decimal). For example, `100` can represent 1 USD or 100 JPY.
    expr:
      kind: path
      path:
      - amount
      - value
  - name: amount_authorized
    type: Utf8
    nullable: true
    virtual: false
    description: A representation of an amount of money, consisting of an amount and a currency.
