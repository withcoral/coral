- name: payment_intent_search
  description: Search PaymentIntents
  filters:
  - name: query
    required: true
  request:
    method: GET
    path: /v1/payment_intents/search
    query:
    - name: query
      from: filter
      key: query
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: page
    page_param: page
    page_start: 1
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount
    type: Int64
    nullable: true
    virtual: false
    description: Amount intended to be collected by this PaymentIntent. A positive integer representing how much to charge in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal) (e.g., 100 cents to charge $1.00 or 100 to charge ¥100, a zero-decimal currency). The minimum amount is $0.50 US or [equivalent in charge currency](https://docs.stripe.com/currencies#minimum-and-maximum-charge-amounts). The amount value supports up to eight digits (e.g., a value of 99999999 for a USD charge of $999,999.99).
    expr:
      kind: path
      path:
      - amount
  - name: amount_capturable
    type: Int64
    nullable: true
    virtual: false
    description: Amount that can be captured from this PaymentIntent.
    expr:
      kind: path
      path:
      - amount_capturable
  - name: amount_details
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - amount_details
  - name: amount_details__discount_amount
    type: Int64
    nullable: true
    virtual: false
    description: |-
      The total discount applied on the transaction represented in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal). An integer greater than 0.

      This field is mutually exclusive with the `amount_details[line_items][#][discount_amount]` field.
    expr:
      kind: path
      path:
      - amount_details
      - discount_amount
  - name: amount_details__error
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - amount_details
      - error
  - name: amount_details__error__code
    type: Utf8
    nullable: true
    virtual: false
    description: The code of the error that occurred when validating the current amount details.
    expr:
      kind: path
      path:
      - amount_details
      - error
      - code
  - name: amount_details__error__message
    type: Utf8
    nullable: true
    virtual: false
    description: A message providing more details about the error.
    expr:
      kind: path
      path:
      - amount_details
      - error
      - message
  - name: amount_details__line_items
    type: Utf8
    nullable: true
    virtual: false
    description: A list of line items, each containing information about a product in the PaymentIntent. There is a maximum of 200 line items.
    expr:
      kind: path
      path:
      - amount_details
      - line_items
  - name: amount_details__line_items__data
    type: Utf8
    nullable: true
    virtual: false
    description: Details about each object.
    expr:
      kind: path
      path:
      - amount_details
      - line_items
      - data
  - name: amount_details__line_items__has_more
    type: Boolean
    nullable: true
    virtual: false
    description: True if this list has another page of items after this one that can be fetched.
    expr:
      kind: path
      path:
      - amount_details
      - line_items
      - has_more
  - name: amount_details__line_items__object
    type: Utf8
    nullable: true
    virtual: false
    description: String representing the object's type. Objects of the same type share the same value. Always has the value `list`.
    expr:
      kind: path
      path:
      - amount_details
      - line_items
      - object
  - name: amount_details__line_items__url
    type: Utf8
    nullable: true
