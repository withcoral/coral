- name: invoiceitems
  description: List all invoice items
  filters:
  - name: created
    required: false
  - name: customer
    required: false
  - name: customer_account
    required: false
  - name: invoice
    required: false
  - name: pending
    required: false
  - name: invoiceitem
    required: false
  request:
    method: GET
    path: /v1/invoiceitems
    query:
    - name: created
      explode: true
      from: filter
      key: created
    - name: customer
      from: filter
      key: customer
    - name: customer_account
      from: filter
      key: customer_account
    - name: invoice
      from: filter
      key: invoice
    - name: pending
      from: filter
      key: pending
  requests:
  - when_filters:
    - invoiceitem
    method: GET
    path: /v1/invoiceitems/{{filter.invoiceitem}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount
    type: Int64
    nullable: true
    virtual: false
    description: Amount (in the `currency` specified) of the invoice item. This should always be equal to `unit_amount * quantity`.
    expr:
      kind: path
      path:
      - amount
  - name: created
    type: Utf8
    nullable: true
    virtual: true
    description: Only return invoice items that were created during the given date interval.
    expr:
      kind: from_filter
      key: created
  - name: currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    expr:
      kind: path
      path:
      - currency
  - name: customer
    type: Utf8
    nullable: true
    virtual: false
    description: The ID of the customer to bill for this invoice item.
    expr:
      kind: path
      path:
      - customer
  - name: customer_account
    type: Utf8
    nullable: true
    virtual: false
    description: The ID of the account to bill for this invoice item.
    expr:
      kind: path
      path:
      - customer_account
  - name: date
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - date
  - name: description
    type: Utf8
    nullable: true
    virtual: false
    description: An arbitrary string attached to the object. Often useful for displaying to users.
    expr:
      kind: path
      path:
      - description
