- name: issuing_cards
  description: List all cards
  filters:
  - name: cardholder
    required: false
  - name: created
    required: false
  - name: exp_month
    required: false
  - name: exp_year
    required: false
  - name: last4
    required: false
  - name: personalization_design
    required: false
  - name: status
    required: false
  - name: type
    required: false
  - name: card
    required: false
  request:
    method: GET
    path: /v1/issuing/cards
    query:
    - name: cardholder
      from: filter
      key: cardholder
    - name: created
      explode: true
      from: filter
      key: created
    - name: exp_month
      from: filter
      key: exp_month
    - name: exp_year
      from: filter
      key: exp_year
    - name: last4
      from: filter
      key: last4
    - name: personalization_design
      from: filter
      key: personalization_design
    - name: status
      from: filter
      key: status
    - name: type
      from: filter
      key: type
  requests:
  - when_filters:
    - card
    method: GET
    path: /v1/issuing/cards/{{filter.card}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: brand
    type: Utf8
    nullable: true
    virtual: false
    description: The brand of the card.
    expr:
      kind: path
      path:
      - brand
  - name: cancellation_reason
    type: Utf8
    nullable: true
    virtual: false
    description: The reason why the card was canceled.
    expr:
      kind: path
      path:
      - cancellation_reason
  - name: card
    type: Utf8
    nullable: true
    virtual: true
    expr:
      kind: from_filter
      key: card
  - name: cardholder
    type: Utf8
    nullable: true
    virtual: false
    description: |-
      An Issuing `Cardholder` object represents an individual or business entity who is [issued](https://docs.stripe.com/issuing) cards.

      Related guide: [How to create a cardholder](https://docs.stripe.com/issuing/cards/virtual/issue-cards#create-cardholder)
    expr:
      kind: path
      path:
      - cardholder
  - name: created
    type: Int64
    nullable: true
    virtual: false
    description: Time at which the object was created. Measured in seconds since the Unix epoch.
    expr:
      kind: path
      path:
      - created
  - name: currency
    type: Utf8
    nullable: true
    virtual: false
    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Supported currencies are `usd` in the US, `eur` in the EU, and `gbp` in the UK.
    expr:
      kind: path
      path:
      - currency
  - name: cvc
    type: Utf8
    nullable: true
    virtual: false
    description: The card's CVC. For security reasons, this is only available for virtual cards, and will be omitted unless you explicitly request it with [the `expand` parameter](https://docs.stripe.com/api/expanding_objects). Additionally, it's only available via the ["Retrieve a card" endpoint](https://docs.stripe.com/api/issuing/cards/retrieve), not via "List all cards" or any other endpoint.
    expr:
      kind: path
      path:
      - cvc
  - name: exp_month
    type: Int64
    nullable: true
    virtual: false
    description: The expiration month of the card.
    expr:
      kind: path
      path:
      - exp_month
  - name: exp_year
    type: Int64
    nullable: true
    virtual: false
    description: The expiration year of the card.
    expr:
      kind: path
      path:
      - exp_year
  - name: financial_account
    type: Utf8
    nullable: true
    virtual: false
    description: The financial account this card is attached to.
    expr:
      kind: path
      path:
      - financial_account
  - name: id
    type: Utf8
    nullable: true
    virtual: false
    description: Unique identifier for the object.
    expr:
      kind: path
      path:
      - id
  - name: last4
    type: Utf8
    nullable: true
    virtual: false
    description: The last 4 digits of the card number.
    expr:
      kind: path
      path:
      - last4
  - name: latest_fraud_warning
    type: Utf8
    nullable: true
    virtual: false
    expr:
      kind: path
      path:
      - latest_fraud_warning
  - name: latest_fraud_warning__started_at
    type: Int64
    nullable: true
    virtual: false
    description: Timestamp of the most recent fraud warning.
    expr:
      kind: path
      path:
      - latest_fraud_warning
      - started_at
  - name: latest_fraud_warning__type
    type: Utf8
    nullable: true
    virtual: false
    description: The type of fraud warning that most recently took place on this card. This field updates with every new fraud warning, so the value changes over time. If populated, cancel and reissue the card.
    expr:
      kind: path
      path:
      - latest_fraud_warning
