- name: coupons
  description: List all coupons
  filters:
  - name: created
    required: false
  - name: coupon
    required: false
  request:
    method: GET
    path: /v1/coupons
    query:
    - name: created
      explode: true
      from: filter
      key: created
  requests:
  - when_filters:
    - coupon
    method: GET
    path: /v1/coupons/{{filter.coupon}}
  response:
    rows_path:
    - data
    allow_404_empty: false
    row_strategy: direct
  pagination:
    mode: auto
    page_start: 0
    page_step: 1
    offset_start: 0
    link_header_require_results: false
  columns:
  - name: amount_off
    type: Int64
    nullable: true
    virtual: false
    description: Amount (in the `currency` specified) that will be taken off the subtotal of any invoices for this customer.
    expr:
      kind: path
