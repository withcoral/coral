    description: Projects in the Linear workspace
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Projects($first: Int!, $after: String) {
              projects(first: $first, after: $after) {
                nodes {
                  id
                  name
                  slugId
                  state
                  progress
                  targetDate
                  createdAt
                  updatedAt
                  teams {
                    nodes {
                      id
                      key
                      name
                    }
                  }
                }
                pageInfo {
                  endCursor
