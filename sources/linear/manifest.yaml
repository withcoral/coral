      - name: name
        type: Utf8
        nullable: false
        description: Project name
        expr:
          kind: path
          path:
            - name
      - name: slug_id
        type: Utf8
        nullable: true
        description: Project short slug identifier
        expr:
          kind: path
          path:
            - slugId
      - name: state
        type: Utf8
        nullable: true
        description: Project state
        expr:
          kind: path
          path:
            - state
      - name: progress
        type: Float64
        nullable: true
        description: Project progress fraction
        expr:
