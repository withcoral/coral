name: linear
version: 2.1.0
dsl_version: 3
backend: http
description: Manage issues, projects, cycles, and initiatives across teams
base_url: https://api.linear.app
auth:
  headers:
    - name: Authorization
      from: template
      template: "{{secret.LINEAR_API_KEY}}"

tables:
  - name: teams
    description: Teams in the Linear workspace
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Teams($first: Int!, $after: String) {
              teams(first: $first, after: $after) {
                nodes {
                  id
                  key
                  name
                  description
                  private
                  createdAt
                  updatedAt
                }
                pageInfo {
                  endCursor
                }
              }
            }
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - teams
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - teams
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Team ID
        expr:
          kind: path
          path:
            - id
      - name: key
        type: Utf8
        nullable: false
        description: Team key
        expr:
          kind: path
          path:
            - key
      - name: name
        type: Utf8
        nullable: false
        description: Team name
        expr:
          kind: path
          path:
            - name
      - name: description
        type: Utf8
        nullable: true
        description: Team description
        expr:
          kind: path
          path:
            - description
      - name: private
        type: Boolean
        nullable: true
        description: Whether the team is private
        expr:
          kind: path
          path:
            - private
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
  - name: users
